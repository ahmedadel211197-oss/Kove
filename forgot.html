<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kove — نسيت كلمة المرور</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#060f1a;--teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;--white:#f0f6fa;--muted:#5a7a94;--b2:rgba(255,255,255,0.06);--err:#f87171;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(62,207,198,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(62,207,198,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none;}
body::after{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(62,207,198,.07),transparent 70%);pointer-events:none;}
.card{position:relative;z-index:1;width:100%;max-width:420px;background:rgba(9,21,37,.85);border:1px solid var(--b2);border-radius:16px;padding:40px 36px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeUp .6s ease both;}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;text-decoration:none;}
.logo img{height:36px;width:36px;object-fit:contain;}
.logo-n{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;background:linear-gradient(120deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
h1{font-size:22px;font-weight:900;text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.7;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.field input{width:100%;background:rgba(6,15,26,.8);border:1px solid var(--b2);border-radius:8px;padding:11px 14px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:rgba(62,207,198,.4);box-shadow:0 0 0 3px rgba(62,207,198,.08);}
.field input::placeholder{color:var(--muted);}
.field input.err-input{border-color:var(--err);}
.err-msg{font-size:12px;color:var(--err);margin-top:5px;display:none;}
.err-msg.show{display:block;}
.strength{height:3px;border-radius:2px;margin-top:6px;background:var(--b2);overflow:hidden;}
.s-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0;}
.btn{width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--teal-d),var(--teal));color:var(--bg);transition:opacity .2s,transform .2s;margin-top:8px;}
.btn:hover{opacity:.87;transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.alert-box{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.alert-box.show{display:block;}
.alert-box.ok{background:rgba(62,207,198,.1);border:1px solid rgba(62,207,198,.2);color:var(--teal);}
.alert-box.bad{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--err);}
.spin{width:15px;height:15px;border:2px solid rgba(6,15,26,.3);border-top-color:var(--bg);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
.lrow{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
.lrow a{color:var(--teal);text-decoration:none;font-weight:700;}
.lrow a:hover{opacity:.8;}
.terms-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0;}
.terms-row input[type=checkbox]{width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--teal);cursor:pointer;}
.terms-row label{font-size:12px;color:var(--muted);line-height:1.6;cursor:pointer;}
.terms-row a{color:var(--teal);text-decoration:none;}
.forgot-link{display:block;text-align:left;font-size:12px;color:var(--muted);text-decoration:none;margin-bottom:4px;transition:color .2s;}
.forgot-link:hover{color:var(--teal);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:480px){.card{padding:28px 20px;}}
</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="logo">
    <img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove" onerror="this.style.display='none'"/>
    <span class="logo-n">KOVE</span>
  </a>
  <h1>نسيت كلمة المرور؟</h1>
  <p class="sub">أدخل بريدك الإلكتروني وهنبعتلك رابط لإعادة التعيين.</p>
  <div class="alert-box" id="al"></div>
  <div class="field">
    <label>البريد الإلكتروني</label>
    <input type="email" id="em" placeholder="example@email.com" autocomplete="email"/>
    <div class="err-msg" id="em-e">أدخل بريد إلكتروني صحيح</div>
  </div>
  <button class="btn" id="btn" onclick="doReset()">إرسال رابط الاستعادة</button>
  <div class="lrow"><a href="login.html">رجوع لتسجيل الدخول</a></div>
</div>
<script>

  const { createClient } = window.supabase;
  const sb = createClient('https://votiamtckjctbidhuxap.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q');

function alert2(msg,t){var e=document.getElementById('al');e.textContent=msg;e.className='alert-box show '+t;}
function load(on){var b=document.getElementById('btn');b.disabled=on;b.innerHTML=on?'<span class="spin"></span>جاري الإرسال...':'إرسال رابط الاستعادة';}
async function doReset(){
  var em=document.getElementById('em').value.trim();
  document.getElementById('em-e').classList.remove('show');
  document.getElementById('em').classList.remove('err-input');
  if(!em||!/^[^@]+@[^@]+\.[^@]+$/.test(em)){
    document.getElementById('em-e').classList.add('show');
    document.getElementById('em').classList.add('err-input');
    return;
  }
  load(true);
  var r=await sb.auth.resetPasswordForEmail(em,{redirectTo:window.location.origin+'/reset-password.html'});
  load(false);
  if(r.error){alert2('حصل خطأ، حاول تاني','bad');}
  else{alert2('تم الإرسال! افتح بريدك واضغط على الرابط.','ok');document.getElementById('btn').disabled=true;}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter')doReset();});
</script>
</body>
</html>
