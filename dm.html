<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove — الرسائل الخاصة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#040b14;--bg2:#071320;--bg3:#0a1a2e;--bg4:#0d2038;--bg5:#0f2540;
  --teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;
  --white:#e8f4f8;--muted:#4a6a82;--muted2:#2a4558;
  --border:rgba(62,207,198,.1);--b2:rgba(255,255,255,.05);
  --online:#22c55e;--dnd:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{color:var(--white);font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s,visibility .6s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(62,207,198,.5));animation:spP 2s ease-in-out infinite;}
.sp-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-dots{display:flex;gap:5px;}
.sp-dots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:spD 1.2s ease-in-out infinite;}
.sp-dots span:nth-child(2){animation-delay:.2s;}.sp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes spP{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
@keyframes spD{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

#app{display:flex;flex:1;overflow:hidden;opacity:0;transition:opacity .5s;height:100vh;}
#app.show{opacity:1;}

/* ── DM SIDEBAR ── */
.dm-sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--b2);display:flex;flex-direction:column;}
.dm-sidebar-top{height:52px;flex-shrink:0;border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 16px;gap:10px;}
.dm-logo{display:flex;align-items:center;gap:7px;}
.dm-logo img{width:24px;height:24px;object-fit:contain;}
.dm-logo-name{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;background:linear-gradient(120deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.dm-sep{width:1px;height:18px;background:var(--b2);}
.dm-sidebar-title{font-size:13px;font-weight:800;color:var(--white);}
.dm-back{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);margin-right:auto;transition:color .2s;}
.dm-back:hover{color:var(--white);}

/* dm list */
.dm-list{flex:1;overflow-y:auto;padding:6px 0;}
.dm-item{display:flex;align-items:center;gap:10px;padding:9px 12px 9px 16px;cursor:pointer;transition:background .12s;position:relative;}
.dm-item:hover{background:var(--bg3);}
.dm-item.act{background:rgba(62,207,198,.08);}
.dm-item.act::before{content:'';position:absolute;right:0;top:6px;bottom:6px;width:3px;background:var(--teal);border-radius:0 2px 2px 0;}
.dm-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;position:relative;overflow:hidden;}
.dm-av img{width:100%;height:100%;object-fit:cover;}
.dm-st{position:absolute;bottom:1px;left:1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2);}
.s-on{background:var(--online);}.s-off{background:var(--muted2);}
.dm-name{font-size:13px;font-weight:800;color:var(--white);}
.dm-preview{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.dm-time{font-size:10px;color:var(--muted2);position:absolute;left:14px;top:12px;}
.dm-unread{position:absolute;left:14px;bottom:12px;background:var(--teal);color:var(--bg);font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;}

/* user area at bottom of sidebar */
.dm-user-area{flex-shrink:0;border-top:1px solid var(--b2);background:var(--bg);}
.dm-user-card{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;transition:background .15s;}
.dm-user-card:hover{background:var(--bg3);}
.dm-uav{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--bg);position:relative;overflow:hidden;}
.dm-uav img{width:100%;height:100%;object-fit:cover;}
.dm-uav-dot{position:absolute;bottom:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--online);border:2px solid var(--bg);}
.dm-uname{font-size:12px;font-weight:800;color:var(--white);}
.dm-utag{font-size:10px;color:var(--muted);}
.dm-user-acts{display:flex;gap:2px;margin-right:auto;}
.dm-ubtn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.dm-ubtn:hover{background:var(--bg4);color:var(--white);}

/* ── CHAT ── */
.chat{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);}
.chat-top{height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 16px;gap:10px;}
.chat-top-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;overflow:hidden;}
.chat-top-av img{width:100%;height:100%;object-fit:cover;}
.chat-top-name{font-size:15px;font-weight:800;color:var(--white);}
.chat-top-status{font-size:12px;color:var(--online);}
.chat-top-acts{margin-right:auto;display:flex;gap:3px;}
.ct-btn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.ct-btn:hover{background:var(--bg3);color:var(--white);}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:14px;}
.msgs-inner{display:flex;flex-direction:column;}
.date-sep{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--b2);}
.date-sep span{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}
.bgroup{margin-bottom:6px;}
.brow{display:flex;align-items:flex-end;gap:8px;}
.brow.mine{flex-direction:row-reverse;}
.bav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer;overflow:hidden;}
.bav img{width:100%;height:100%;object-fit:cover;}
.bav.hide{visibility:hidden;}
.bcontent{display:flex;flex-direction:column;gap:2px;max-width:68%;}
.bmeta{display:flex;align-items:center;gap:5px;padding:0 4px;margin-bottom:2px;}
.brow.mine .bmeta{flex-direction:row-reverse;}
.bname{font-size:11px;font-weight:800;}
.btime{font-size:10px;color:var(--muted2);}
.bubble{padding:9px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.bubble.other{background:var(--bg3);border:1px solid var(--b2);border-radius:4px 18px 18px 18px;color:var(--white);}
.bubble.mine{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:var(--bg);font-weight:600;border-radius:18px 4px 18px 18px;box-shadow:0 3px 12px rgba(62,207,198,.2);}
.sys-msg{text-align:center;font-size:12px;color:var(--muted);padding:4px 0 8px;font-style:italic;}

/* typing */
.typing{padding:3px 14px 6px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;min-height:24px;flex-shrink:0;}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:td 1.3s ease-in-out infinite;display:inline-block;margin:0 1px;}
.tdots span:nth-child(2){animation-delay:.18s;}.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}

/* input */
.inp-area{padding:0 14px 12px;flex-shrink:0;}
.inp-box{background:var(--bg3);border:1px solid var(--b2);border-radius:22px;display:flex;align-items:flex-end;gap:6px;padding:5px 6px;transition:border-color .2s,box-shadow .2s;}
.inp-box:focus-within{border-color:var(--border);box-shadow:0 0 0 3px rgba(62,207,198,.05);}
.ibtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;flex-shrink:0;transition:all .2s;}
.ibtn:hover{color:var(--teal);background:rgba(62,207,198,.08);}
.msg-inp{flex:1;background:none;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);padding:5px 4px;resize:none;min-height:32px;max-height:120px;line-height:1.5;align-self:center;}
.msg-inp::placeholder{color:var(--muted);}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--teal);border:none;display:flex;align-items:center;justify-content:center;color:var(--bg);flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(62,207,198,.25);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:active{transform:scale(.94);}

/* empty chat */
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);}
.empty-chat svg{width:52px;height:52px;opacity:.2;}
.empty-chat-text{font-size:14px;}
.empty-chat-sub{font-size:13px;color:var(--muted2);}

/* loading */
.ldg{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:10px;color:var(--muted);}
.lsp{width:24px;height:24px;border:2px solid var(--b2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg-new{animation:msgIn .22s ease both;}

/* MOBILE */
.m-top{display:none;height:50px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);align-items:center;padding:0 12px;gap:8px;}
.mtbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;}
.b-nav{display:none;height:54px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b2);justify-content:space-around;align-items:center;}
.bnbtn{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted2);background:none;border:none;padding:0 10px;transition:color .2s;}
.bnbtn.act{color:var(--teal);}
.bnbtn svg{width:20px;height:20px;}
.bnbtn span{font-size:9px;font-weight:700;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s;}
.ov.show{opacity:1;pointer-events:all;}
.drw{position:fixed;right:0;top:0;bottom:0;z-index:90;width:280px;background:var(--bg2);border-left:1px solid var(--b2);transform:translateX(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;}
.drw.open{transform:none;}
.drw-hd{padding:13px 16px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drw-title{font-size:14px;font-weight:900;color:var(--white);}
.drw-cls{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;}

@media(max-width:860px){
  .dm-sidebar{display:none;}
  .m-top,.b-nav{display:flex;}
  .inp-area{padding:0 10px 10px;}
  .msgs{padding:10px;}
}
</style>
</head>
<body>

<div id="splash">
  <img class="sp-img" src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove" onerror="this.style.display='none'"/>
  <div class="sp-name">KOVE</div>
  <div class="sp-dots"><span></span><span></span><span></span></div>
</div>

<!-- MOBILE TOP -->
<div class="m-top">
  <button class="mtbtn" onclick="openDrw()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
  <div id="mChatTopAv" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;"></div>
  <span id="mChatName" style="font-size:14px;font-weight:800;color:var(--white);">الرسائل الخاصة</span>
  <a href="app.html" class="mtbtn" style="margin-right:auto;color:var(--muted);">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
</div>

<!-- APP -->
<div id="app">

<!-- DM SIDEBAR -->
<div class="dm-sidebar">
  <div class="dm-sidebar-top">
    <a href="app.html" class="dm-logo">
      <img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove" onerror="this.style.display='none'"/>
      <span class="dm-logo-name">KOVE</span>
    </a>
    <div class="dm-sep"></div>
    <span class="dm-sidebar-title">الرسائل الخاصة</span>
    <a href="app.html" class="dm-back">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      رجوع
    </a>
  </div>
  <div class="dm-list" id="dmList">
    <div class="ldg"><div class="lsp"></div></div>
  </div>
  <!-- USER AREA AT BOTTOM -->
  <div class="dm-user-area">
    <a href="profile.html" class="dm-user-card" id="dmUserCard">
      <div class="dm-uav" id="dmUav"><span id="dmUavL">?</span><div class="dm-uav-dot"></div></div>
      <div style="flex:1;min-width:0;">
        <div class="dm-uname" id="dmUname">...</div>
        <div class="dm-utag" id="dmUtag">@...</div>
      </div>
      <div class="dm-user-acts" onclick="event.preventDefault()">
        <a href="profile.html" class="dm-ubtn" title="البروفايل">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
        </a>
        <a href="settings.html" class="dm-ubtn" title="الإعدادات">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </a>
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat" id="chatArea">
  <!-- empty state (no channel selected) -->
  <div class="empty-chat" id="emptyChat">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <div class="empty-chat-text">اختار محادثة</div>
    <div class="empty-chat-sub">اختار شخص من القائمة على الجنب</div>
  </div>
  <!-- chat content (shown when channel selected) -->
  <div id="chatContent" style="display:none;flex-direction:column;flex:1;overflow:hidden;display:none;">
    <div class="chat-top">
      <div class="chat-top-av" id="chatTopAv"></div>
      <div>
        <div class="chat-top-name" id="chatTopName">...</div>
        <div class="chat-top-status">أونلاين</div>
      </div>
      <div class="chat-top-acts">
        <button class="ct-btn" title="بروفايل" onclick="viewFriendProfile()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
        </button>
      </div>
    </div>
    <div class="msgs" id="msgsEl"></div>
    <div class="typing" id="typingEl" style="display:none">
      <div class="tdots"><span></span><span></span><span></span></div>
      <span id="typingTxt"></span>
    </div>
    <div class="inp-area">
      <div class="inp-box">
        <button class="ibtn" title="إيموجي" onclick="togEmoji()">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <textarea class="msg-inp" id="msgInp" placeholder="اكتب رسالة..." rows="1" onkeydown="hKey(event)" oninput="aResize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

</div><!-- /app -->

<!-- BOTTOM NAV -->
<div class="b-nav">
  <button class="bnbtn" onclick="location.href='app.html'">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>الشات</span>
  </button>
  <button class="bnbtn" onclick="location.href='home.html'">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    <span>الأصدقاء</span>
  </button>
  <button class="bnbtn act">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    <span>DMs</span>
  </button>
  <button class="bnbtn" onclick="location.href='profile.html'">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
    <span>أنا</span>
  </button>
</div>

<!-- MOBILE DRAWER: dm list -->
<div class="ov" id="ov" onclick="closeDrw()"></div>
<div class="drw" id="dDM">
  <div class="drw-hd">
    <span class="drw-title">الرسائل الخاصة</span>
    <button class="drw-cls" onclick="closeDrw()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="dm-list" id="dmListMobile" style="flex:1;overflow-y:auto;padding:6px 0;"></div>
  <!-- user card at bottom of drawer -->
  <div style="border-top:1px solid var(--b2);background:var(--bg);">
    <a href="profile.html" style="display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;transition:background .15s;text-decoration:none;" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">
      <div class="dm-uav" id="dmUavM"><span id="dmUavLM">?</span><div class="dm-uav-dot"></div></div>
      <div style="flex:1;min-width:0;"><div class="dm-uname" id="dmUnameM">...</div><div class="dm-utag" id="dmUtagM">@...</div></div>
      <a href="settings.html" class="dm-ubtn" onclick="event.stopPropagation()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </a>
  </div>
</div>

<!-- EMOJI -->
<div id="emojiP" style="display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:12px;z-index:200;box-shadow:0 14px 44px rgba(0,0,0,.7);width:min(300px,92vw);">
  <input id="eSearch" style="width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:7px 12px;font-family:Cairo,sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:8px;" placeholder="ابحث..." oninput="filterE(this.value)"/>
  <div id="eGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto;"></div>
</div>

<script>
var {createClient}=window.supabase;
var sb=createClient('https://votiamtckjctbidhuxap.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q');
var user=null,profile=null,curChannel=null,curFriend=null,rtSub=null;
var COLORS=['#3ecfc6','#c8a84b','#7c6fe0','#f87171','#22c55e','#f97316','#ec4899','#06b6d4'];
var EMOJIS=['😀','😂','😍','🥰','😎','🤩','😭','😤','🤔','😴','🥺','👋','👍','👎','🙌','👏','✌️','🤞','👌','💪','🎮','🏆','🔥','💻','📱','🎵','⚽','🎯','💡','💎','⚡','❤️','💛','💙','💜','💔','💯','✅','⭐','🌟','🎉'];
function gc(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
function gl(n){return n?n.charAt(0).toUpperCase():'?';}
function ts(t){return new Date(t).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})+' م';}

window.addEventListener('load',async function(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='login.html';return;}
  user=session.user;
  var {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  if(profile){
    var col=gc(profile.name||profile.username||'k');
    ['dmUav','dmUavM'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.background='linear-gradient(135deg,'+col+','+col+'aa)';});
    ['dmUavL','dmUavLM'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=gl(profile.name);});
    ['dmUname','dmUnameM'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=profile.name||'';});
    ['dmUtag','dmUtagM'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent='@'+(profile.username||'');});
  }
  await loadDMs();
  // check URL param
  var params=new URLSearchParams(location.search);
  var chId=params.get('channel');
  if(chId) await openChannelById(chId);
  setTimeout(function(){document.getElementById('splash').classList.add('hide');document.getElementById('app').classList.add('show');},1800);
});

async function loadDMs(){
  var {data:channels}=await sb.from('dm_channels').select('id,user1_id,user2_id,created_at')
    .or('user1_id.eq.'+user.id+',user2_id.eq.'+user.id)
    .order('created_at',{ascending:false});

  if(!channels||!channels.length){
    document.getElementById('dmList').innerHTML='<div style="padding:20px;text-align:center;font-size:13px;color:var(--muted);">مفيش محادثات بعد<br/><a href="home.html" style="color:var(--teal);margin-top:8px;display:block;">إضافة أصدقاء</a></div>';
    document.getElementById('dmListMobile').innerHTML=document.getElementById('dmList').innerHTML;
    return;
  }

  // fetch friend profiles
  var friendIds=channels.map(function(c){return c.user1_id===user.id?c.user2_id:c.user1_id;});
  var {data:profs}=await sb.from('profiles').select('id,name,username,avatar_url').in('id',friendIds);

  document.getElementById('dmList').innerHTML='';
  document.getElementById('dmListMobile').innerHTML='';

  channels.forEach(function(ch){
    var fid=ch.user1_id===user.id?ch.user2_id:ch.user1_id;
    var fp=(profs||[]).find(function(p){return p.id===fid;})||{};
    var col=gc(fp.name||fp.username||'?');
    var card=makeDMCard(ch,fp,col);
    document.getElementById('dmList').appendChild(card.cloneNode(true));
    var card2=makeDMCard(ch,fp,col);
    card2.onclick=function(){openChannel(ch,fp);closeDrw();};
    document.getElementById('dmListMobile').appendChild(card2);
  });
}

function makeDMCard(ch,fp,col){
  var div=document.createElement('div');
  div.className='dm-item'+(curChannel&&curChannel.id===ch.id?' act':'');
  var avHtml=fp.avatar_url?'<img src="'+fp.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent=\''+gl(fp.name)+'\'"/>':gl(fp.name||'?');
  div.innerHTML=[
    '<div class="dm-av" style="background:linear-gradient(135deg,'+col+','+col+'99)">'+avHtml+'<div class="dm-st s-on"></div></div>',
    '<div style="flex:1;min-width:0;"><div class="dm-name">'+(fp.name||fp.username||'مجهول')+'</div><div class="dm-preview">@'+(fp.username||'')+'</div></div>'
  ].join('');
  div.onclick=function(){openChannel(ch,fp);};
  return div;
}

async function openChannelById(chId){
  var {data:ch}=await sb.from('dm_channels').select('*').eq('id',chId).single();
  if(!ch) return;
  var fid=ch.user1_id===user.id?ch.user2_id:ch.user1_id;
  var {data:fp}=await sb.from('profiles').select('*').eq('id',fid).single();
  openChannel(ch,fp||{});
}

async function openChannel(ch,fp){
  curChannel=ch;curFriend=fp;
  var col=gc(fp.name||fp.username||'?');

  // update top bar
  var topAv=document.getElementById('chatTopAv');
  topAv.style.background='linear-gradient(135deg,'+col+','+col+'99)';
  if(fp.avatar_url){topAv.innerHTML='<img src="'+fp.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent=\''+gl(fp.name)+'\'"/>';}
  else{topAv.textContent=gl(fp.name||'?');}
  document.getElementById('chatTopName').textContent=fp.name||fp.username||'مجهول';

  // mobile
  var mAv=document.getElementById('mChatTopAv');
  mAv.style.background='linear-gradient(135deg,'+col+','+col+'99)';
  mAv.textContent=gl(fp.name||'?');
  document.getElementById('mChatName').textContent=fp.name||fp.username||'مجهول';

  // show chat
  document.getElementById('emptyChat').style.display='none';
  var cc=document.getElementById('chatContent');
  cc.style.display='flex';
  document.getElementById('msgInp').placeholder='اكتب رسالة لـ '+(fp.name||'');

  // highlight in list
  document.querySelectorAll('.dm-item').forEach(function(d){d.classList.remove('act');});

  await loadMsgs();
  subMsgs();
}

async function loadMsgs(){
  document.getElementById('msgsEl').innerHTML='<div class="ldg"><div class="lsp"></div></div>';
  var {data}=await sb.from('dm_messages').select('*').eq('channel_id',curChannel.id).order('created_at',{ascending:true}).limit(60);
  renderMsgs(data||[]);
}

function renderMsgs(msgs){
  var el=document.getElementById('msgsEl');el.innerHTML='';
  var inner=document.createElement('div');inner.className='msgs-inner';inner.id='msgsInner';
  if(!msgs.length){inner.innerHTML='<div class="sys-msg">ابدأ المحادثة — قول مرحبا! 👋</div>';el.appendChild(inner);return;}
  var sep=document.createElement('div');sep.className='date-sep';sep.innerHTML='<span>اليوم</span>';inner.appendChild(sep);
  var lastUid=null;
  msgs.forEach(function(m,i){inner.appendChild(mkBubble(m,lastUid===m.user_id&&i>0));lastUid=m.user_id;});
  el.appendChild(inner);el.scrollTop=el.scrollHeight;
}

function mkBubble(m,cont){
  var isMe=m.user_id===user.id;
  var p=isMe?profile:curFriend;var name=(p&&(p.name||p.username))||'مجهول';var col=gc(name);
  var grp=document.createElement('div');grp.className='bgroup';if(!cont)grp.style.marginTop='6px';
  var row=document.createElement('div');row.className='brow'+(isMe?' mine':'');
  var av=document.createElement('div');av.className='bav'+(cont?' hide':'');av.style.background='linear-gradient(135deg,'+col+','+col+'99)';
  if(p&&p.avatar_url){av.innerHTML='<img src="'+p.avatar_url+'" onerror="this.parentElement.textContent=\''+gl(name)+'\'"/>';}else{av.textContent=gl(name);}
  var bc=document.createElement('div');bc.className='bcontent';
  if(!cont){var meta=document.createElement('div');meta.className='bmeta';meta.innerHTML='<span class="bname" style="color:'+col+'">'+name+'</span><span class="btime">'+ts(m.created_at)+'</span>';bc.appendChild(meta);}
  var bub=document.createElement('div');bub.className='bubble '+(isMe?'mine':'other');bub.textContent=m.content;
  bc.appendChild(bub);
  if(isMe){row.appendChild(bc);row.appendChild(av);}else{row.appendChild(av);row.appendChild(bc);}
  grp.appendChild(row);return grp;
}

function addMsg(m){
  var inner=document.getElementById('msgsInner');if(!inner){loadMsgs();return;}
  var empty=inner.querySelector('.sys-msg');if(empty)empty.remove();
  var el=mkBubble(m,false);el.classList.add('msg-new');el.style.marginTop='6px';
  inner.appendChild(el);document.getElementById('msgsEl').scrollTop=99999;
}

function subMsgs(){
  if(rtSub){sb.removeChannel(rtSub);rtSub=null;}
  if(!curChannel) return;
  rtSub=sb.channel('dm-'+curChannel.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'dm_messages',filter:'channel_id=eq.'+curChannel.id},
      function(payload){addMsg(payload.new);}).subscribe();
}

async function sendMsg(){
  if(!curChannel) return;
  var inp=document.getElementById('msgInp');var txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  await sb.from('dm_messages').insert({channel_id:curChannel.id,user_id:user.id,content:txt,type:'text'});
}

function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function aResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

function viewFriendProfile(){
  // future: open friend profile page
}

// emoji
var eAll=EMOJIS;
function buildE(list){document.getElementById('eGrid').innerHTML=list.map(function(e){return '<button onclick="insE(\''+e+'\')" style="aspect-ratio:1;border-radius:6px;border:none;background:none;font-size:20px;cursor:pointer;" onmouseover="this.style.background=\'var(--bg4)\'" onmouseout="this.style.background=\'none\'">'+e+'</button>';}).join('');}
function filterE(q){buildE(q?eAll.filter(function(e){return e.includes(q);}):eAll);}
function insE(e){document.getElementById('msgInp').value+=e;document.getElementById('msgInp').focus();closeEmoji();}
function togEmoji(){var p=document.getElementById('emojiP');if(p.style.display==='none'||!p.style.display){buildE(eAll);p.style.display='block';document.getElementById('eSearch').value='';}else{closeEmoji();}}
function closeEmoji(){document.getElementById('emojiP').style.display='none';}

function openDrw(){document.getElementById('ov').classList.add('show');document.getElementById('dDM').classList.add('open');}
function closeDrw(){document.getElementById('ov').classList.remove('show');document.getElementById('dDM').classList.remove('open');}

document.addEventListener('click',function(e){
  var ep=document.getElementById('emojiP');
  if(ep.style.display==='block'&&!ep.contains(e.target)&&!e.target.closest('.ibtn'))closeEmoji();
});
</script>
</body>
</html>
