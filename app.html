<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove</title>
<link rel="stylesheet" href="_kove.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="_kove.js"></script>
<style>
.chat{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);}
.ch-tabs{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--b2);padding:8px 14px 0;gap:4px;overflow-x:auto;flex-shrink:0;}
.ch-tabs::-webkit-scrollbar{height:0;}
.ch-tab{display:flex;align-items:center;gap:6px;padding:7px 14px 9px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;transition:all .15s;flex-shrink:0;background:none;border-top:none;border-inline:none;}
.ch-tab:hover{color:var(--white);background:rgba(255,255,255,.03);}
.ch-tab.act{color:var(--white);border-bottom-color:var(--teal);background:rgba(62,207,198,.06);}
.tab-acts{margin-right:auto;display:flex;gap:2px;}
.tbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.tbtn:hover{background:var(--bg3);color:var(--white);}
.msgs{flex:1;overflow-y:auto;padding:14px;}
.msgs-inner{display:flex;flex-direction:column;}
.date-sep{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}
.date-sep::before,.date-sep::after{content:"";flex:1;height:1px;background:var(--b2);}
.date-sep span{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}
@media(max-width:860px){.ch-tabs{display:none;}.msgs{padding:10px;}}
</style>
</head>
<body>
<div id="splash">
  <img class="sp-img" src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove" onerror="this.style.display='none'"/>
  <div class="sp-name">KOVE</div>
  <div class="sp-dots"><span></span><span></span><span></span></div>
</div>

<div class="m-top">
  <button class="mtbtn" onclick="openDrw('srv')">
    <svg width="12" height="12" viewBox="0 0 28 28" fill="none"><path d="M8 4L8 24M8 14L20 4M8 14L20 24" stroke="#3ecfc6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <span id="mSrvName" style="font-size:13px;font-weight:800;color:var(--white);">السيرفر</span>
  <span class="m-ch" id="mChName" style="font-size:13px;color:var(--teal);font-weight:700;margin-right:auto;"># القناة</span>
  <button class="mtbtn" onclick="openDrw('ch')">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
</div>
<div class="m-tabs" id="mTabs"></div>

<div id="app">
<!-- RAIL -->
<div class="rail" id="rail">
  <a href="index.html" class="r-logo"><img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove" onerror="this.style.display='none'"/></a>
  <div class="r-sep"></div>
  <a href="profile.html" class="r-ic" id="railMe" title="أنا" style="color:var(--muted);">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
  </a>
  <a href="home.html" class="r-ic teal" title="الأصدقاء">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  </a>
  <a href="dm.html" class="r-ic teal" title="الرسائل الخاصة">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </a>
  <div class="r-sep"></div>
  <div id="railSrvs"></div>
  <div class="r-sep"></div>
  <div class="r-add" title="إضافة سيرفر" onclick="location.href='create-server.html'">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-hdr"><span class="sb-hdr-n" id="sidebarTitle">...</span><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
  <div class="ch-list" id="chList"><div class="ldg"><div class="lsp"></div></div></div>
  <div class="ubar">
    <a href="profile.html" class="uav" id="uavEl" title="بروفايلي"><span id="uavL">?</span><div class="uav-dot"></div></a>
    <div style="flex:1;min-width:0;"><div class="u-name" id="uNameEl">...</div><div class="u-tag" id="uTagEl">@...</div></div>
    <a href="profile.html" class="ubtn" title="البروفايل"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg></a>
    <a href="profile.html#settings" class="ubtn" title="الإعدادات"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
  </div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="ch-tabs" id="chTabs"></div>
  <div class="msgs" id="msgsEl"><div class="ldg"><div class="lsp"></div><span>جاري التحميل...</span></div></div>
  <div class="typing" id="typingEl" style="display:none"><div class="tdots"><span></span><span></span><span></span></div><span id="typingTxt"></span></div>
  <div class="inp-area" style="position:relative;">
    <div class="cmd-hint" id="cmdHint" style="display:none;"></div>
    <div class="inp-box">
      <button class="ibtn" onclick="togEmoji()"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
      <textarea class="msg-inp" id="msgInp" placeholder="اكتب رسالة أو / للأوامر..." rows="1" onkeydown="hKey(event)" oninput="onInp(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="b-nav">
  <button class="bnbtn act" onclick="setBn(this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>الشات</span></button>
  <button class="bnbtn" onclick="setBn(this);location.href='home.html'"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>الأصدقاء</span></button>
  <button class="bnbtn" onclick="setBn(this);location.href='dm.html'"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>DMs</span></button>
  <button class="bnbtn" onclick="setBn(this);location.href='profile.html'"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg><span>أنا</span></button>
</div>

<!-- DRAWERS -->
<div class="ov" id="ov" onclick="closeDrws()"></div>
<div class="drw" style="width:256px;background:var(--bg2);border-left:1px solid var(--b2);" id="dSrv">
  <div class="drw-hd"><span class="drw-title">السيرفرات</span><button class="drw-cls" onclick="closeDrws()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="srv-list" id="dSrvList"></div>
</div>
<div class="drw" style="width:256px;background:var(--bg2);border-left:1px solid var(--b2);" id="dCh">
  <div class="drw-hd"><span class="drw-title" id="dChTitle">القنوات</span><button class="drw-cls" onclick="closeDrws()"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <div class="ch-list" id="dChList" style="flex:1;overflow-y:auto;padding:4px 0;"></div>
  <div class="ubar" style="background:var(--bg);border-top:1px solid var(--b2);">
    <a href="profile.html" class="uav" id="dUav"><span id="dUavL">?</span><div class="uav-dot"></div></a>
    <div style="flex:1;min-width:0;"><div class="u-name" id="dUname">...</div><div class="u-tag" id="dUtag">@...</div></div>
  </div>
</div>

<!-- EMOJI -->
<div id="emojiP" style="display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:12px;z-index:200;box-shadow:0 14px 44px rgba(0,0,0,.7);width:min(300px,92vw);">
  <input id="eSearch" style="width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:7px 12px;font-family:Cairo,sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:8px;" placeholder="ابحث..." oninput="filterE(this.value)"/>
  <div id="eGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto;"></div>
</div>

<script>
var sb=window.supabase.createClient(SB_URL,SB_KEY);
var user=null,profile=null,servers=[],curSrv=null,channels=[],curCh=null,memberRole=null,rtSub=null,isOwner=false;
var EMOJIS=['😀','😂','😍','🥰','😎','🤩','😭','😤','🤔','😴','🥺','👋','👍','👎','🙌','👏','✌️','🤞','👌','💪','🎮','🏆','🔥','💻','📱','🎵','⚽','🎯','💡','💎','⚡','❤️','💛','💙','💜','💔','💯','✅','⭐','🌟','🎉'];
var BOT_CMDS=['help','ping','info','members','ban','kick','mute','warn','bans','warns','poll','say','welcome','prefix'];
var cmdSelIdx=-1;

window.addEventListener('load',async function(){
  var session=await requireAuth(sb);if(!session)return;
  user=session.user;
  var {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  if(profile){
    var col=gc(profile.name||profile.username||'k');
    ['uavEl','dUav'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.background='linear-gradient(135deg,'+col+','+col+'aa)';});
    ['uavL','dUavL'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=gl(profile.name);});
    ['uNameEl','dUname'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=profile.name||'';}); 
    ['uTagEl','dUtag'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent='@'+(profile.username||'')}); 
  }
  await loadServers();
  showSplash(null,2000);
});

async function loadServers(){
  var {data}=await sb.from('server_members').select('server_id,servers(id,name,icon_url,owner_id)').eq('user_id',user.id);
  servers=(data||[]).map(function(d){return d.servers;}).filter(Boolean);
  renderRail();renderDrwSrvs();
  var params=new URLSearchParams(location.search);
  var sid=params.get('server');
  var srv=sid?servers.find(function(s){return s.id===sid;}):servers[0];
  if(srv)await selSrv(srv);else showEmpty();
}

function renderRail(){
  var el=document.getElementById('railSrvs');el.innerHTML='';
  servers.forEach(function(s){
    var col=gc(s.name);var d=document.createElement('div');
    d.className='r-ic'+(curSrv&&curSrv.id===s.id?' act':'');d.title=s.name;d.textContent=gl(s.name);
    if(!(curSrv&&curSrv.id===s.id)){d.style.background=col+'22';d.style.color=col;}
    d.onclick=function(){selSrv(s);};el.appendChild(d);
  });
}

function renderDrwSrvs(){
  var el=document.getElementById('dSrvList');el.innerHTML='';
  servers.forEach(function(s){
    var col=gc(s.name);var d=document.createElement('div');d.className='srv-item'+(curSrv&&curSrv.id===s.id?' act':'');
    d.innerHTML='<div class="srv-ic2" style="background:linear-gradient(135deg,'+col+','+col+'aa)">'+gl(s.name)+'</div><div><div class="srv-n2">'+s.name+'</div></div>';
    d.onclick=function(){selSrv(s);closeDrws();};el.appendChild(d);
  });
  var add=document.createElement('div');add.className='srv-add2';
  add.innerHTML='<div class="srv-add-ic"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div><div class="srv-n2" style="color:var(--teal)">إضافة سيرفر</div></div>';
  add.onclick=function(){location.href='create-server.html';};el.appendChild(add);
}

async function selSrv(s){
  curSrv=s;isOwner=s.owner_id===user.id;
  document.getElementById('sidebarTitle').textContent=s.name;
  document.getElementById('mSrvName').textContent=s.name;
  document.getElementById('dChTitle').textContent=s.name;
  renderRail();renderDrwSrvs();
  var {data:rm}=await sb.from('server_members').select('roles(name,color,permissions,position)').eq('server_id',s.id).eq('user_id',user.id).single();
  memberRole=rm&&rm.roles?rm.roles:{name:'عضو',color:'#4a6a82',permissions:{send_messages:true,view_channels:true},position:0};
  await loadChs();
}

async function loadChs(){
  document.getElementById('chList').innerHTML='<div class="ldg"><div class="lsp"></div></div>';
  var {data}=await sb.from('channels').select('*').eq('server_id',curSrv.id).order('position');
  channels=data||[];renderChs();
  if(channels.length>0)await selCh(channels[0]);
}

function renderChs(){
  var list=document.getElementById('chList'),dList=document.getElementById('dChList'),tabs=document.getElementById('chTabs'),mTabs=document.getElementById('mTabs');
  list.innerHTML='';dList.innerHTML='';tabs.innerHTML='';mTabs.innerHTML='';
  var txt=channels.filter(function(c){return c.type==='text'||!c.type;});
  if(txt.length){[list,dList].forEach(function(p){var c=document.createElement('div');c.className='ch-cat';c.textContent='قنوات نصية';p.appendChild(c);});}
  txt.forEach(function(ch){
    [false,true].forEach(function(isDrw){
      var r=document.createElement('div');r.className='ch-row'+(curCh&&curCh.id===ch.id?' act':'');
      r.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
      r.onclick=function(){selCh(ch);if(isDrw)closeDrws();};
      (isDrw?dList:list).appendChild(r);
    });
    var t=document.createElement('button');t.className='ch-tab'+(curCh&&curCh.id===ch.id?' act':'');
    t.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
    t.onclick=function(){selCh(ch);};tabs.appendChild(t);
    var mt=t.cloneNode(true);mt.className='m-tab'+(curCh&&curCh.id===ch.id?' act':'');mt.onclick=function(){selCh(ch);};mTabs.appendChild(mt);
  });
  var acts=document.createElement('div');acts.className='tab-acts';acts.innerHTML='<button class="tbtn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>';
  tabs.appendChild(acts);
}

async function selCh(ch){
  curCh=ch;document.getElementById('msgInp').placeholder='اكتب رسالة في #'+ch.name+' أو / للأوامر...';
  document.getElementById('mChName').textContent='# '+ch.name;
  renderChs();
  var ex=document.querySelector('.no-perm');if(ex)ex.remove();
  var canSend=isOwner||(memberRole&&memberRole.permissions&&(memberRole.permissions.admin||memberRole.permissions.send_messages));
  if(!canSend){
    document.getElementById('msgInp').disabled=true;
    var d=document.createElement('div');d.className='no-perm';
    d.innerHTML='<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> مش عندك صلاحية الكتابة هنا';
    document.querySelector('.inp-area').before(d);
  } else {document.getElementById('msgInp').disabled=false;}
  await loadMsgs();subMsgs();
}

async function loadMsgs(){
  document.getElementById('msgsEl').innerHTML='<div class="ldg"><div class="lsp"></div><span>جاري التحميل...</span></div>';
  var {data}=await sb.from('messages').select('*,profiles(id,name,username,avatar_url),bot_profiles(id,name,username)').eq('channel_id',curCh.id).order('created_at',{ascending:true}).limit(60);
  renderMsgs(data||[]);
}

function renderMsgs(msgs){
  var el=document.getElementById('msgsEl');el.innerHTML='';
  var inner=document.createElement('div');inner.className='msgs-inner';inner.id='msgsInner';
  if(!msgs.length){inner.innerHTML='<div class="sys-msg">لا توجد رسائل — ابدأ المحادثة 👋</div>';el.appendChild(inner);return;}
  var sep=document.createElement('div');sep.className='date-sep';sep.innerHTML='<span>اليوم</span>';inner.appendChild(sep);
  var lastUid=null;
  msgs.forEach(function(m,i){inner.appendChild(mkBubble(m,lastUid===m.user_id&&i>0));lastUid=m.user_id;});
  el.appendChild(inner);el.scrollTop=el.scrollHeight;
}

function mkBubble(m,cont){
  var isBot=!!m.bot_id;
  var isMe=!isBot&&m.user_id===user.id;
  var p=isBot?(m.bot_profiles||{name:'Kove Bot',username:'kove_bot'}):(m.profiles||{});
  var name=p.name||p.username||'مجهول';
  var col=isBot?'#3ecfc6':gc(name);
  var own=!isBot&&curSrv&&m.user_id===curSrv.owner_id;
  var grp=document.createElement('div');grp.className='bgroup';if(!cont)grp.style.marginTop='6px';
  var row=document.createElement('div');row.className='brow'+(isMe?' mine':'');
  var av=document.createElement('div');av.className='bav'+(cont?' hide':'')+(isBot?' bot-av':'');
  if(isBot){av.innerHTML=botAvatar();}
  else if(p.avatar_url){av.innerHTML='<img src="'+p.avatar_url+'" onerror="this.parentElement.textContent=\''+gl(name)+'\'" />'; av.style.background='linear-gradient(135deg,'+col+','+col+'99)';}
  else{av.textContent=gl(name);av.style.background='linear-gradient(135deg,'+col+','+col+'99)';}
  var bc=document.createElement('div');bc.className='bcontent';
  if(!cont){
    var meta=document.createElement('div');meta.className='bmeta';
    var botBdg=isBot?'<span class="bdg bdg-bot">Bot</span>':'';
    meta.innerHTML='<span class="bname" style="color:'+col+'">'+name+'</span>'+botBdg+getBadges(m.user_id,memberRole,own)+'<span class="btime">'+ts(m.created_at)+'</span>';
    bc.appendChild(meta);
  }
  var bub=document.createElement('div');
  bub.className='bubble '+(isMe?'mine':isBot?'bot':'other');
  bub.textContent=m.content;
  bc.appendChild(bub);
  if(isMe){row.appendChild(bc);row.appendChild(av);}else{row.appendChild(av);row.appendChild(bc);}
  grp.appendChild(row);return grp;
}

function addMsg(m){
  var inner=document.getElementById('msgsInner');if(!inner){loadMsgs();return;}
  var empty=inner.querySelector('.sys-msg');if(empty)empty.remove();
  var el=mkBubble(m,false);el.classList.add('msg-new');el.style.marginTop='6px';
  inner.appendChild(el);document.getElementById('msgsEl').scrollTop=99999;
}

function subMsgs(){
  if(rtSub){sb.removeChannel(rtSub);rtSub=null;}
  if(!curCh)return;
  rtSub=sb.channel('msgs-'+curCh.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'channel_id=eq.'+curCh.id},
      async function(payload){
        var m=payload.new;
        if(m.bot_id){var {data:bp}=await sb.from('bot_profiles').select('name,username').eq('id',m.bot_id).single();m.bot_profiles=bp;}
        else if(m.user_id!==user.id){var {data:pr}=await sb.from('profiles').select('name,username,avatar_url').eq('id',m.user_id).single();m.profiles=pr;}
        else{m.profiles=profile;}
        addMsg(m);
      }).subscribe();
}

async function sendMsg(){
  var canSend=isOwner||(memberRole&&memberRole.permissions&&(memberRole.permissions.admin||memberRole.permissions.send_messages));
  if(!canSend||!curCh)return;
  var inp=document.getElementById('msgInp');var txt=inp.value.trim();if(!txt)return;
  hideCmdHint();
  inp.value='';inp.style.height='auto';
  await sb.from('messages').insert({channel_id:curCh.id,server_id:curSrv.id,user_id:user.id,content:txt,type:'text'});
  // check if bot command
  await checkBotCommand(sb,txt,curCh.id,curSrv.id,user.id);
}

function onInp(el){
  aResize(el);
  var val=el.value;
  if(val.startsWith('/')&&val.length>0){
    var q=val.slice(1).toLowerCase();
    var matches=BOT_CMDS.filter(function(c){return c.startsWith(q);});
    if(matches.length>0&&q.indexOf(' ')===-1){showCmdHint(matches);}else{hideCmdHint();}
  } else {hideCmdHint();}
}

function showCmdHint(cmds){
  var h=document.getElementById('cmdHint');cmdSelIdx=-1;
  h.innerHTML=cmds.slice(0,6).map(function(c,i){
    var descs={help:'قائمة الأوامر',ping:'تحقق من البوت',info:'معلومات السيرفر',members:'عدد الأعضاء',ban:'حظر عضو',kick:'طرد عضو',mute:'كتم عضو',warn:'تحذير عضو',bans:'المحظورون',warns:'التحذيرات',poll:'إنشاء تصويت',say:'البوت يقول',welcome:'رسالة الترحيب',prefix:'تغيير الـ prefix'};
    return '<div class="cmd-hint-item" onclick="pickCmd(\''+c+'\')"><span class="cmd-name">/'+c+'</span><span class="cmd-desc">'+( descs[c]||'')+'</span></div>';
  }).join('');
  h.style.display='block';
}

function hideCmdHint(){document.getElementById('cmdHint').style.display='none';cmdSelIdx=-1;}
function pickCmd(c){var inp=document.getElementById('msgInp');inp.value='/'+c+' ';inp.focus();hideCmdHint();}

function hKey(e){
  var h=document.getElementById('cmdHint');
  if(h.style.display!=='none'){
    var items=h.querySelectorAll('.cmd-hint-item');
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      e.preventDefault();
      if(e.key==='ArrowUp')cmdSelIdx=Math.max(0,cmdSelIdx-1);
      else cmdSelIdx=Math.min(items.length-1,cmdSelIdx+1);
      items.forEach(function(it,i){it.classList.toggle('sel',i===cmdSelIdx);});
      return;
    }
    if(e.key==='Tab'&&cmdSelIdx>=0){e.preventDefault();items[cmdSelIdx].click();return;}
    if(e.key==='Escape'){hideCmdHint();return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function aResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

var eAll=EMOJIS;
function buildE(list){document.getElementById('eGrid').innerHTML=list.map(function(e){return '<button onclick="insE(\''+e+'\')" style="aspect-ratio:1;border-radius:6px;border:none;background:none;font-size:20px;cursor:pointer;" onmouseover="this.style.background='var(--bg4)'" onmouseout="this.style.background='none'">'+e+'</button>';}).join('');}
function filterE(q){buildE(q?eAll.filter(function(e){return e.includes(q);}):eAll);}
function insE(e){document.getElementById('msgInp').value+=e;document.getElementById('msgInp').focus();closeEmoji();}
function togEmoji(){var p=document.getElementById('emojiP');if(p.style.display==='none'||!p.style.display){buildE(eAll);p.style.display='block';document.getElementById('eSearch').value='';}else{closeEmoji();}}
function closeEmoji(){document.getElementById('emojiP').style.display='none';}
function showEmpty(){document.getElementById('msgsEl').innerHTML='<div class="ldg"><span>مفيش سيرفرات بعد</span><button onclick="location.href=\'create-server.html\'" style="padding:10px 24px;border-radius:10px;background:var(--teal);color:var(--bg);border:none;font-size:14px;font-weight:800;cursor:pointer;">إنشاء سيرفر</button></div>';}
function openDrw(w){document.getElementById('ov').classList.add('show');document.getElementById(w==='srv'?'dSrv':'dCh').classList.add('open');}
function closeDrws(){document.getElementById('ov').classList.remove('show');['dSrv','dCh'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('open');});}
function setBn(b){document.querySelectorAll('.bnbtn').forEach(function(x){x.classList.remove('act');});b.classList.add('act');}
document.addEventListener('click',function(e){
  var ep=document.getElementById('emojiP');
  if(ep.style.display==='block'&&!ep.contains(e.target)&&!e.target.closest('.ibtn'))closeEmoji();
});
</script>
