<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#040b14;--bg2:#071320;--bg3:#0a1a2e;--bg4:#0d2038;--bg5:#0f2540;
  --teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;
  --white:#e8f4f8;--muted:#4a6a82;--muted2:#2a4558;
  --border:rgba(62,207,198,.1);--b2:rgba(255,255,255,.05);
  --online:#22c55e;--dnd:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s,visibility .6s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-img{width:88px;height:88px;object-fit:contain;filter:drop-shadow(0 0 28px rgba(62,207,198,.5));animation:spP 2s ease-in-out infinite;}
.sp-fb{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,var(--teal-d),var(--teal));display:none;align-items:center;justify-content:center;box-shadow:0 0 36px rgba(62,207,198,.4);animation:spP 2s ease-in-out infinite;}
.sp-name{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-dots{display:flex;gap:5px;}
.sp-dots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:spD 1.2s ease-in-out infinite;}
.sp-dots span:nth-child(2){animation-delay:.2s;}.sp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes spP{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
@keyframes spD{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* APP */
#app{display:flex;flex:1;overflow:hidden;opacity:0;transition:opacity .5s;}
#app.show{opacity:1;}

/* RAIL */
.rail{width:56px;flex-shrink:0;background:var(--bg);border-left:1px solid var(--b2);display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;gap:4px;overflow-y:auto;}
.r-logo{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:4px;flex-shrink:0;transition:transform .2s;text-decoration:none;}
.r-logo:hover{transform:scale(1.07);}
.r-logo img{width:38px;height:38px;object-fit:contain;}
.r-sep{width:26px;height:1px;background:var(--b2);flex-shrink:0;margin:2px 0;}
.r-ic{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--muted);background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-decoration:none;}
.r-ic:hover{border-radius:10px;background:var(--bg5);color:var(--white);}
.r-ic.act{border-radius:10px;background:var(--teal);color:var(--bg);box-shadow:0 3px 12px rgba(62,207,198,.3);}
.r-ic.act::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:4px;height:18px;background:var(--teal);border-radius:2px 0 0 2px;}
.r-ic.teal{color:var(--teal);}
.r-add{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--muted2);color:var(--teal);cursor:pointer;transition:all .2s;margin-top:2px;}
.r-add:hover{background:var(--teal);color:var(--bg);border-radius:12px;border-color:var(--teal);}

/* SIDEBAR */
.sidebar{width:228px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--b2);display:flex;flex-direction:column;overflow:hidden;}
.sb-hdr{padding:0 14px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b2);cursor:pointer;}
.sb-hdr:hover{background:rgba(255,255,255,.02);}
.sb-hdr-n{font-size:14px;font-weight:900;color:var(--white);}
.ch-list{flex:1;overflow-y:auto;padding:4px 0;}
.ch-cat{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:10px 14px 4px;display:flex;align-items:center;justify-content:space-between;}
.ch-row{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 14px;margin:1px 6px;border-radius:7px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all .12s;position:relative;}
.ch-row:hover{background:var(--bg3);color:var(--white);}
.ch-row.act{background:rgba(62,207,198,.1);color:var(--white);}
.ch-row.act::before{content:'';position:absolute;right:0;top:4px;bottom:4px;width:3px;background:var(--teal);border-radius:0 2px 2px 0;}
.ch-row.unread{color:var(--white);font-weight:700;}
.ch-badge{margin-right:auto;background:var(--dnd);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;}

/* user bar */
.ubar{height:52px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--b2);display:flex;align-items:center;gap:8px;padding:0 6px 0 10px;}
.uav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--bg);position:relative;cursor:pointer;overflow:hidden;}
.uav img{width:100%;height:100%;object-fit:cover;}
.uav-dot{position:absolute;bottom:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--online);border:2px solid var(--bg);}
.uname{font-size:12px;font-weight:800;color:var(--white);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.utag{font-size:10px;color:var(--muted);}
.ubtn{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.ubtn:hover{background:var(--bg3);color:var(--white);}

/* CHAT */
.chat{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);}
.ch-tabs{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--b2);padding:8px 14px 0;gap:4px;overflow-x:auto;flex-shrink:0;}
.ch-tabs::-webkit-scrollbar{height:0;}
.ch-tab{display:flex;align-items:center;gap:6px;padding:7px 14px 9px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;transition:all .15s;flex-shrink:0;background:none;border-top:none;border-inline:none;}
.ch-tab:hover{color:var(--white);background:rgba(255,255,255,.03);}
.ch-tab.act{color:var(--white);border-bottom-color:var(--teal);background:rgba(62,207,198,.06);}
.ch-tab.act svg{color:var(--teal);}
.tab-bd{background:var(--dnd);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;}
.tab-acts{margin-right:auto;display:flex;gap:2px;}
.tbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.tbtn:hover{background:var(--bg3);color:var(--white);}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:14px;}
.msgs-inner{display:flex;flex-direction:column;gap:0;}
.date-sep{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--b2);}
.date-sep span{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}
.bgroup{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.brow{display:flex;align-items:flex-end;gap:8px;}
.brow.mine{flex-direction:row-reverse;}
.bav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer;overflow:hidden;position:relative;}
.bav img{width:100%;height:100%;object-fit:cover;}
.bav.hide{visibility:hidden;}
.bcontent{display:flex;flex-direction:column;gap:2px;max-width:66%;}
.bmeta{display:flex;align-items:center;gap:5px;padding:0 4px;margin-bottom:2px;flex-wrap:wrap;}
.brow.mine .bmeta{flex-direction:row-reverse;}
.bname{font-size:11px;font-weight:800;}
.btime{font-size:10px;color:var(--muted2);}
.bubble{padding:9px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.bubble.other{background:var(--bg3);border:1px solid var(--b2);border-radius:4px 18px 18px 18px;color:var(--white);}
.bubble.mine{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:var(--bg);font-weight:600;border-radius:18px 4px 18px 18px;box-shadow:0 3px 12px rgba(62,207,198,.2);}
.bubble.gold-b{background:linear-gradient(135deg,#a07830,var(--gold));color:var(--bg);font-weight:600;border-radius:4px 18px 18px 18px;}
.bubble.stk{background:transparent;border:none;font-size:52px;line-height:1.1;padding:2px 6px;}
.sys-msg{text-align:center;font-size:12px;color:var(--muted);padding:4px 0 8px;font-style:italic;}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.3px;flex-shrink:0;}
.bdg-owner{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid rgba(200,168,75,.25);}
.bdg-admin{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.bdg-kove{background:rgba(62,207,198,.12);color:var(--teal);border:1px solid rgba(62,207,198,.2);}

/* TYPING */
.typing{padding:3px 14px 6px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;min-height:24px;flex-shrink:0;}
.tdots{display:flex;gap:3px;align-items:center;}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:td 1.3s ease-in-out infinite;}
.tdots span:nth-child(2){animation-delay:.18s;}.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}

/* INPUT */
.inp-area{padding:0 14px 12px;flex-shrink:0;position:relative;}
.inp-box{background:var(--bg3);border:1px solid var(--b2);border-radius:22px;display:flex;align-items:flex-end;gap:6px;padding:5px 6px;transition:border-color .2s,box-shadow .2s;}
.inp-box:focus-within{border-color:var(--border);box-shadow:0 0 0 3px rgba(62,207,198,.05);}
.ibtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;flex-shrink:0;transition:all .2s;}
.ibtn:hover{color:var(--teal);background:rgba(62,207,198,.08);}
.msg-inp{flex:1;background:none;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);padding:5px 4px;resize:none;min-height:32px;max-height:120px;line-height:1.5;align-self:center;}
.msg-inp::placeholder{color:var(--muted);}
.msg-inp:disabled{opacity:.4;cursor:not-allowed;}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--teal);border:none;display:flex;align-items:center;justify-content:center;color:var(--bg);flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(62,207,198,.25);}
.send-btn:hover{transform:scale(1.08);box-shadow:0 3px 16px rgba(62,207,198,.4);}
.send-btn:active{transform:scale(.94);}
.no-perm{display:flex;align-items:center;gap:8px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.15);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--dnd);margin:0 14px 8px;}

/* PANELS */
.panel{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:12px;z-index:50;box-shadow:0 14px 44px rgba(0,0,0,.7);display:none;}
.panel.show{display:block;}
.ep{width:min(320px,90vw);}
.sp{width:min(260px,90vw);}
.e-search{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:7px 12px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:8px;}
.e-search::placeholder{color:var(--muted);}
.e-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:180px;overflow-y:auto;}
.e-btn{aspect-ratio:1;border-radius:6px;border:none;background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.e-btn:hover{background:var(--bg4);transform:scale(1.2);}
.stk-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.stk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stk-btn{aspect-ratio:1;border-radius:10px;border:1px solid var(--b2);background:var(--bg3);font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.stk-btn:hover{background:rgba(62,207,198,.08);border-color:var(--border);transform:scale(1.05);}

/* MOBILE */
.m-top{display:none;height:50px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);align-items:center;padding:0 12px;gap:8px;}
.m-srv-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--white);background:rgba(255,255,255,.05);padding:5px 10px;border-radius:8px;border:none;}
.m-srv-btn svg{color:var(--teal);}
.m-ch{font-size:13px;color:var(--teal);font-weight:700;margin-right:auto;}
.mtbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;}
.m-tabs{display:none;overflow-x:auto;padding:8px 12px 0;background:var(--bg2);border-bottom:1px solid var(--b2);gap:4px;flex-shrink:0;}
.m-tabs::-webkit-scrollbar{height:0;}
.m-tab{display:flex;align-items:center;gap:5px;padding:6px 12px 8px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;transition:all .15s;background:none;border-top:none;border-inline:none;}
.m-tab:hover{color:var(--white);}
.m-tab.act{color:var(--white);border-bottom-color:var(--teal);background:rgba(62,207,198,.06);}
.b-nav{display:none;height:54px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b2);justify-content:space-around;align-items:center;}
.bnbtn{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted2);background:none;border:none;padding:0 12px;transition:color .2s;position:relative;}
.bnbtn.act{color:var(--teal);}
.bnbtn svg{width:20px;height:20px;}
.bnbtn span{font-size:9px;font-weight:700;}
.bn-dot::after{content:'';position:absolute;top:0;right:8px;width:7px;height:7px;border-radius:50%;background:var(--dnd);}

/* DRAWERS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px);}
.ov.show{opacity:1;pointer-events:all;}
.drw{position:fixed;right:0;top:0;bottom:0;z-index:90;transform:translateX(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;}
.drw.open{transform:none;}
.drw-srv{width:256px;background:var(--bg2);border-left:1px solid var(--b2);}
.drw-ch{width:256px;background:var(--bg2);border-left:1px solid var(--b2);}
.drw-hd{padding:13px 16px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drw-title{font-size:14px;font-weight:900;color:var(--white);}
.drw-cls{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;}
.srv-list{flex:1;overflow-y:auto;padding:10px;}
.srv-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:5px;transition:background .15s;}
.srv-item:hover{background:var(--bg3);}
.srv-item.act{background:rgba(62,207,198,.07);}
.srv-ic2{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;}
.srv-n2{font-size:13px;font-weight:800;color:var(--white);}
.srv-cnt{font-size:11px;color:var(--muted);}
.srv-add2{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1.5px dashed var(--muted2);margin-top:4px;transition:all .2s;}
.srv-add2:hover{border-color:var(--teal);background:rgba(62,207,198,.04);}
.srv-add-ic{width:40px;height:40px;border-radius:12px;border:1.5px dashed var(--muted2);display:flex;align-items:center;justify-content:center;color:var(--teal);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:10px;color:var(--muted);}
.lsp{width:28px;height:28px;border:2px solid var(--b2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg-new{animation:msgIn .22s ease both;}

@media(max-width:860px){
  .rail,.sidebar,.ch-tabs{display:none;}
  .m-top,.m-tabs,.b-nav{display:flex;}
  .inp-area{padding:0 10px 10px;}
  .msgs{padding:10px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="sp-img" src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"
       onerror="this.style.display='none';document.getElementById('spFb').style.display='flex'"/>
  <div class="sp-fb" id="spFb">
    <svg width="44" height="44" viewBox="0 0 28 28" fill="none"><path d="M8 4L8 24M8 14L20 4M8 14L20 24" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="sp-name">KOVE</div>
  <div class="sp-dots"><span></span><span></span><span></span></div>
</div>

<!-- MOBILE TOP -->
<div class="m-top">
  <button class="m-srv-btn" onclick="openDrw('srv')">
    <svg width="12" height="12" viewBox="0 0 28 28" fill="none"><path d="M8 4L8 24M8 14L20 4M8 14L20 24" stroke="#3ecfc6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="mSrvName">السيرفر</span>
    <svg width="10" height="10" fill="none" stroke="#4a6a82" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <span class="m-ch" id="mChName"># القناة</span>
  <button class="mtbtn"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  <button class="mtbtn" onclick="openDrw('ch')"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
</div>
<div class="m-tabs" id="mTabs"></div>

<!-- APP -->
<div id="app">

<!-- RAIL -->
<div class="rail">
  <a href="index.html" class="r-logo" title="الرئيسية">
    <img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"

<script>
var SB_URL='https://votiamtckjctbidhuxap.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q';
var sb=window.supabase.createClient(SB_URL,SB_KEY);

// ── REPLACE THIS WITH YOUR USER ID FOR KOVE ADMIN BADGE ──
var KOVE_ADMIN_ID='';

var user=null,profile=null,servers=[],currentServer=null,channels=[],currentChannel=null,memberRole=null,realtimeSub=null,isOwner=false;
var COLORS=['#3ecfc6','#c8a84b','#7c6fe0','#f87171','#22c55e','#f97316','#ec4899','#06b6d4'];

function getColor(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
function getLetter(n){return n?n.charAt(0).toUpperCase():'?';}
function timeStr(ts){return new Date(ts).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})+' م';}

// ── BADGES ──
function getBadges(uid,role,ownerOfServer){
  var b='';
  if(uid===KOVE_ADMIN_ID&&KOVE_ADMIN_ID){
    b+='<span class="bdg bdg-kove"><svg width="8" height="8" viewBox="0 0 28 28" fill="none"><path d="M8 4L8 24M8 14L20 4M8 14L20 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>Kove</span>';
  }
  if(ownerOfServer){
    b+='<span class="bdg bdg-owner"><svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.3L12 16.8l-6.2 4.4 2.4-7.3L2 9.4h7.6z"/></svg>أونر</span>';
  } else if(role&&role.permissions&&(role.permissions.admin||role.permissions.manage_server)){
    b+='<span class="bdg bdg-admin"><svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>أدمن</span>';
  }
  return b;
}

// ── PERMISSIONS ──
function hasPerm(p){
  if(!memberRole||!memberRole.permissions) return false;
  var perms=memberRole.permissions;
  return perms.admin===true||perms[p]===true;
}

// ── INIT ──
window.addEventListener('load',async function(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  user=session.user;
  var {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  if(profile){
    var col=getColor(profile.name||profile.username||'k');
    ['uavEl','dUav'].forEach(function(id){
      var el=document.getElementById(id);
      if(el) el.style.background='linear-gradient(135deg,'+col+','+col+'aa)';
    });
    document.getElementById('uavL').textContent=getLetter(profile.name);
    document.getElementById('uNameEl').textContent=profile.name;
    document.getElementById('uTagEl').textContent='@'+profile.username;
    document.getElementById('dUavL').textContent=getLetter(profile.name);
    document.getElementById('dUname').textContent=profile.name;
    document.getElementById('dUtag').textContent='@'+profile.username;
  }
  await loadServers();
  setTimeout(function(){
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
  },2000);
});

// ── SERVERS ──
async function loadServers(){
  var {data}=await sb.from('server_members').select('server_id,servers(id,name,icon_url,owner_id)').eq('user_id',user.id);
  if(!data||data.length===0){servers=[];renderRail();showEmptyState();return;}
  servers=data.map(function(d){return d.servers;}).filter(Boolean);
  renderRail();renderDrwSrvs();
  if(servers.length>0) await selectServer(servers[0]);
}

function renderRail(){
  var el=document.getElementById('railSrvs');
  el.innerHTML='';
  servers.forEach(function(s){
    var div=document.createElement('div');
    div.className='r-ic'+(currentServer&&currentServer.id===s.id?' act':'');
    div.title=s.name;
    div.textContent=getLetter(s.name);
    if(!(currentServer&&currentServer.id===s.id)){
      var col=getColor(s.name);
      div.style.background=col+'22';
      div.style.color=col;
    }
    div.onclick=function(){selectServer(s);};
    el.appendChild(div);
  });
}

function renderDrwSrvs(){
  var el=document.getElementById('dSrvList');
  el.innerHTML='';
  servers.forEach(function(s){
    var col=getColor(s.name);
    var div=document.createElement('div');
    div.className='srv-item'+(currentServer&&currentServer.id===s.id?' act':'');
    div.innerHTML='<div class="srv-ic2" style="background:linear-gradient(135deg,'+col+','+col+'aa)">'+getLetter(s.name)+'</div><div><div class="srv-n2">'+s.name+'</div></div>';
    div.onclick=function(){selectServer(s);closeDrws();};
    el.appendChild(div);
  });
  var add=document.createElement('div');
  add.className='srv-add2';
  add.innerHTML='<div class="srv-add-ic"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div><div class="srv-n2" style="color:var(--teal)">إضافة سيرفر</div><div class="srv-cnt">ابني مجتمعك</div></div>';
  add.onclick=function(){showCreateServer();closeDrws();};
  el.appendChild(add);
}

async function selectServer(srv){
  currentServer=srv;
  isOwner=srv.owner_id===user.id;
  document.getElementById('srvTitle').textContent=srv.name;
  document.getElementById('mSrvName').textContent=srv.name;
  document.getElementById('dChTitle').textContent=srv.name;
  renderRail();renderDrwSrvs();
  await loadMemberRole();
  await loadChannels();
}

// ── ROLES ──
async function loadMemberRole(){
  if(!currentServer) return;
  var {data}=await sb.from('server_members').select('roles(name,color,permissions,position)').eq('server_id',currentServer.id).eq('user_id',user.id).single();
  memberRole=data&&data.roles?data.roles:{name:'عضو',color:'#4a6a82',permissions:{send_messages:true,view_channels:true,add_reactions:true,attach_files:true},position:0};
}

// ── CHANNELS ──
async function loadChannels(){
  document.getElementById('chList').innerHTML='<div class="loading"><div class="lsp"></div></div>';
  var {data}=await sb.from('channels').select('*').eq('server_id',currentServer.id).order('position');
  channels=data||[];
  renderChannels();
  if(channels.length>0) await selectChannel(channels[0]);
}

function renderChannels(){
  var list=document.getElementById('chList');
  var dList=document.getElementById('dChList');
  var tabs=document.getElementById('chTabs');
  var mTabs=document.getElementById('mTabs');
  list.innerHTML='';dList.innerHTML='';tabs.innerHTML='';mTabs.innerHTML='';

  var textChs=channels.filter(function(c){return c.type==='text'||!c.type;});
  if(textChs.length>0){
    var cat=makeCat('قنوات نصية');
    list.appendChild(cat);
    dList.appendChild(makeCat('قنوات نصية'));
  }

  textChs.forEach(function(ch){
    list.appendChild(makeCHrow(ch,false));
    dList.appendChild(makeCHrow(ch,true));
    tabs.appendChild(makeTab(ch));
    mTabs.appendChild(makeMTab(ch));
  });

  var acts=document.createElement('div');
  acts.className='tab-acts';
  acts.innerHTML='<button class="tbtn"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>';
  tabs.appendChild(acts);
}

function makeCat(label){
  var d=document.createElement('div');
  d.className='ch-cat';
  d.innerHTML=label+' <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  return d;
}

function makeCHrow(ch,isDrawer){
  var row=document.createElement('div');
  row.className='ch-row'+(currentChannel&&currentChannel.id===ch.id?' act':'');
  row.innerHTML='<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
  row.onclick=function(){selectChannel(ch);if(isDrawer)closeDrws();};
  return row;
}

function makeTab(ch){
  var t=document.createElement('button');
  t.className='ch-tab'+(currentChannel&&currentChannel.id===ch.id?' act':'');
  t.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
  t.onclick=function(){selectChannel(ch);};
  return t;
}

function makeMTab(ch){
  var t=document.createElement('button');
  t.className='m-tab'+(currentChannel&&currentChannel.id===ch.id?' act':'');
  t.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
  t.onclick=function(){selectChannel(ch);};
  return t;
}

async function selectChannel(ch){
  currentChannel=ch;
  document.getElementById('msgInp').placeholder='اكتب رسالة في #'+ch.name;
  document.getElementById('mChName').textContent='# '+ch.name;
  renderChannels();
  updatePermUI();
  await loadMessages();
  subscribeMessages();
}

function updatePermUI(){
  var existing=document.querySelector('.no-perm');
  if(existing) existing.remove();
  var inp=document.getElementById('msgInp');
  if(!hasPerm('send_messages')&&!isOwner){
    inp.disabled=true;
    var div=document.createElement('div');
    div.className='no-perm';
    div.innerHTML='<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> مش عندك صلاحية الكتابة هنا';
    document.getElementById('msgInp').closest('.inp-area').before(div);
  } else {
    inp.disabled=false;
  }
}

// ── MESSAGES ──
async function loadMessages(){
  document.getElementById('msgsEl').innerHTML='<div class="loading"><div class="lsp"></div><span>جاري التحميل...</span></div>';
  var {data}=await sb.from('messages').select('*,profiles(id,name,username,avatar_url)').eq('channel_id',currentChannel.id).order('created_at',{ascending:true}).limit(60);
  renderMessages(data||[]);
}

function renderMessages(msgs){
  var el=document.getElementById('msgsEl');
  el.innerHTML='';
  var inner=document.createElement('div');
  inner.className='msgs-inner';
  inner.id='msgsInner';
  if(msgs.length===0){inner.innerHTML='<div class="sys-msg">لا توجد رسائل بعد — ابدأ المحادثة 👋</div>';el.appendChild(inner);return;}
  var sep=document.createElement('div');sep.className='date-sep';sep.innerHTML='<span>اليوم</span>';inner.appendChild(sep);
  var lastUid=null;
  msgs.forEach(function(msg,i){
    inner.appendChild(buildMsgEl(msg,lastUid===msg.user_id&&i>0));
    lastUid=msg.user_id;
  });
  el.appendChild(inner);
  el.scrollTop=el.scrollHeight;
}

function buildMsgEl(msg,isCont){
  var isMe=msg.user_id===user.id;
  var p=msg.profiles||{};
  var name=p.name||p.username||'مجهول';
  var col=getColor(name);
  var ownerOfSrv=currentServer&&msg.user_id===currentServer.owner_id;

  var grp=document.createElement('div');
  grp.className='bgroup';
  if(!isCont) grp.style.marginTop='6px';

  var row=document.createElement('div');
  row.className='brow'+(isMe?' mine':'');

  var av=document.createElement('div');
  av.className='bav'+(isCont?' hide':'');
  av.style.background='linear-gradient(135deg,'+col+','+col+'99)';
  if(p.avatar_url){av.innerHTML='<img src="'+p.avatar_url+'" onerror="this.parentElement.textContent=\''+getLetter(name)+'\'"/>';}
  else{av.textContent=getLetter(name);}

  var bc=document.createElement('div');
  bc.className='bcontent';

  if(!isCont){
    var meta=document.createElement('div');
    meta.className='bmeta';
    var badges=getBadges(msg.user_id,memberRole,ownerOfSrv);
    meta.innerHTML='<span class="bname" style="color:'+col+'">'+name+'</span>'+badges+'<span class="btime">'+timeStr(msg.created_at)+'</span>';
    bc.appendChild(meta);
  }

  var bub=document.createElement('div');
  if(msg.type==='sticker'){bub.className='bubble stk';bub.textContent=msg.content;}
  else{bub.className='bubble '+(isMe?'mine':'other');bub.textContent=msg.content;}
  bc.appendChild(bub);

  if(isMe){row.appendChild(bc);row.appendChild(av);}
  else{row.appendChild(av);row.appendChild(bc);}
  grp.appendChild(row);
  return grp;
}

function addNewMsg(msg){
  var inner=document.getElementById('msgsInner');
  if(!inner){loadMessages();return;}
  var empty=inner.querySelector('.sys-msg');if(empty)empty.remove();
  var el=buildMsgEl(msg,false);
  el.classList.add('msg-new');
  el.style.marginTop='6px';
  inner.appendChild(el);
  document.getElementById('msgsEl').scrollTop=99999;
}

// ── REALTIME ──
function subscribeMessages(){
  if(realtimeSub){sb.removeChannel(realtimeSub);realtimeSub=null;}
  if(!currentChannel) return;
  realtimeSub=sb.channel('msgs-'+currentChannel.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'channel_id=eq.'+currentChannel.id},
      async function(payload){
        var msg=payload.new;
        if(msg.user_id!==user.id){
          var {data:pr}=await sb.from('profiles').select('name,username,avatar_url').eq('id',msg.user_id).single();
          msg.profiles=pr;
        } else {msg.profiles=profile;}
        addNewMsg(msg);
      })
    .subscribe();
}

// ── SEND ──
async function sendMsg(){
  if(!hasPerm('send_messages')&&!isOwner) return;
  if(!currentChannel) return;
  var inp=document.getElementById('msgInp');
  var txt=inp.value.trim();if(!txt) return;
  inp.value='';inp.style.height='auto';
  await sb.from('messages').insert({channel_id:currentChannel.id,server_id:currentServer.id,user_id:user.id,content:txt,type:'text'});
}

async function sendSticker(s){
  if(!currentChannel) return;
  await sb.from('messages').insert({channel_id:currentChannel.id,server_id:currentServer.id,user_id:user.id,content:s,type:'sticker'});
  document.getElementById('stkP').classList.remove('show');
}

function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function aResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ── EMOJI ──
var EMOJIS=['😀','😂','😍','🥰','😎','🤩','😭','😤','🤔','😴','🥺','😈','👻','🤖','💀','🎭','👋','👍','👎','🙌','👏','🤝','✌️','🤞','👌','💪','🎮','🏆','🔥','💻','📱','🎵','⚽','🎯','💡','🎁','💎','🚀','⚡','❤️','💛','💙','💜','💔','💯','✅','⭐','🌟','🎉','🎊'];
function buildEmoji(q){
  var list=q?EMOJIS.filter(function(e){return e.includes(q);}):EMOJIS;
  document.getElementById('emojiP').innerHTML='<input class="e-search" placeholder="ابحث..." oninput="buildEmoji(this.value)" value="'+(q||'')+'"/><div class="e-grid">'+list.map(function(e){return '<button class="e-btn" onclick="insertEmoji(\''+e+'\')">'+e+'</button>';}).join('')+'</div>';
}
function insertEmoji(e){document.getElementById('msgInp').value+=e;document.getElementById('msgInp').focus();document.getElementById('emojiP').classList.remove('show');}
function togEmoji(){var ep=document.getElementById('emojiP'),sp=document.getElementById('stkP');sp.classList.remove('show');if(!ep.classList.contains('show'))buildEmoji('');ep.classList.toggle('show');}

// ── STICKERS ──
var STICKERS=['🎮','🏆','🔥','💎','🚀','⚡','🎵','🌟','💯','🤖','👻','🎉','❤️','💪','🎯','🌈','🦁','🐉'];
function buildStk(){document.getElementById('stkP').innerHTML='<div class="stk-lbl">الـ Stickers</div><div class="stk-grid">'+STICKERS.map(function(s){return '<button class="stk-btn" onclick="sendSticker(\''+s+'\')">'+s+'</button>';}).join('')+'</div>';}
function togStk(){var sp=document.getElementById('stkP'),ep=document.getElementById('emojiP');ep.classList.remove('show');if(!sp.classList.contains('show'))buildStk();sp.classList.toggle('show');}

// ── EMPTY STATE ──
function showEmptyState(){
  document.getElementById('chList').innerHTML='<div style="padding:20px 14px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;">مفيش سيرفرات بعد<br/><button onclick="showCreateServer()" style="margin-top:10px;padding:8px 18px;border-radius:8px;background:var(--teal);color:var(--bg);border:none;font-size:13px;font-weight:800;cursor:pointer;">ابني سيرفرك</button></div>';
  document.getElementById('msgsEl').innerHTML='<div class="loading"><span style="font-size:14px">ابدأ بسيرفر جديد 🚀</span><button onclick="showCreateServer()" style="padding:10px 24px;border-radius:10px;background:var(--teal);color:var(--bg);border:none;font-size:14px;font-weight:800;cursor:pointer;">إنشاء سيرفر</button></div>';
}
function showCreateServer(){location.href='create-server.html';}

// ── DRAWERS ──
function openDrw(w){document.getElementById('ov').classList.add('show');document.getElementById(w==='srv'?'dSrv':'dCh').classList.add('open');}
function closeDrws(){document.getElementById('ov').classList.remove('show');document.getElementById('dSrv').classList.remove('open');document.getElementById('dCh').classList.remove('open');}
function setBn(b){document.querySelectorAll('.bnbtn').forEach(function(x){x.classList.remove('act');});b.classList.add('act');}

document.addEventListener('click',function(e){
  var ep=document.getElementById('emojiP'),sp=document.getElementById('stkP');
  if(ep.classList.contains('show')&&!ep.contains(e.target)&&!e.target.closest('.ibtn'))ep.classList.remove('show');
  if(sp.classList.contains('show')&&!sp.contains(e.target)&&!e.target.closest('.ibtn'))sp.classList.remove('show');
});
</script>
