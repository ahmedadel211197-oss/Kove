<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#040b14;--bg2:#071320;--bg3:#0a1a2e;--bg4:#0d2038;--bg5:#0f2540;
  --teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;
  --white:#e8f4f8;--muted:#4a6a82;--muted2:#2a4558;
  --border:rgba(62,207,198,.1);--b2:rgba(255,255,255,.05);
  --online:#22c55e;--dnd:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{color:var(--white);font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s,visibility .6s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-img{width:84px;height:84px;object-fit:contain;filter:drop-shadow(0 0 26px rgba(62,207,198,.5));animation:spP 2s ease-in-out infinite;}
.sp-name{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-dots{display:flex;gap:5px;}
.sp-dots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:spD 1.2s ease-in-out infinite;}
.sp-dots span:nth-child(2){animation-delay:.2s;}.sp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes spP{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
@keyframes spD{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* ── APP ── */
#app{display:flex;flex:1;overflow:hidden;opacity:0;transition:opacity .5s;height:100vh;}
#app.show{opacity:1;}

/* ── RAIL ── */
.rail{width:56px;flex-shrink:0;background:var(--bg);border-left:1px solid var(--b2);display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;gap:4px;overflow-y:auto;}
.r-logo{width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;flex-shrink:0;transition:transform .2s;}
.r-logo:hover{transform:scale(1.07);}
.r-logo img{width:38px;height:38px;object-fit:contain;}
.r-sep{width:26px;height:1px;background:var(--b2);flex-shrink:0;margin:2px 0;}
.r-ic{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted);background:var(--bg3);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.r-ic:hover{border-radius:10px;background:var(--bg5);color:var(--white);}
.r-ic.act{border-radius:10px;background:var(--teal);color:var(--bg);box-shadow:0 3px 12px rgba(62,207,198,.3);}
.r-ic.act::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:4px;height:18px;background:var(--teal);border-radius:2px 0 0 2px;}
.r-ic.teal{color:var(--teal);}
.r-add{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--muted2);color:var(--teal);cursor:pointer;transition:all .2s;margin-top:2px;}
.r-add:hover{background:var(--teal);color:var(--bg);border-radius:12px;border-color:var(--teal);}

/* ── SIDEBAR ── */
.sidebar{width:228px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--b2);display:flex;flex-direction:column;overflow:hidden;}
.sb-hdr{padding:0 14px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b2);cursor:pointer;}
.sb-hdr:hover{background:rgba(255,255,255,.02);}
.sb-hdr-n{font-size:14px;font-weight:900;color:var(--white);}
.ch-list{flex:1;overflow-y:auto;padding:4px 0;}
.ch-cat{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:10px 14px 4px;}
.ch-row{display:flex;align-items:center;gap:8px;padding:6px 8px 6px 14px;margin:1px 6px;border-radius:7px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .12s;position:relative;}
.ch-row:hover{background:var(--bg3);color:var(--white);}
.ch-row.act{background:rgba(62,207,198,.1);color:var(--white);}
.ch-row.act::before{content:'';position:absolute;right:0;top:4px;bottom:4px;width:3px;background:var(--teal);border-radius:0 2px 2px 0;}
.ch-row.unread{color:var(--white);font-weight:700;}
.ch-badge{margin-right:auto;background:var(--dnd);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;}

/* user bar */
.ubar{height:52px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--b2);display:flex;align-items:center;gap:8px;padding:0 6px 0 10px;}
.uav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--bg);position:relative;cursor:pointer;overflow:hidden;}
.uav img{width:100%;height:100%;object-fit:cover;}
.uav-dot{position:absolute;bottom:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--online);border:2px solid var(--bg);}
.u-name{font-size:12px;font-weight:800;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-tag{font-size:10px;color:var(--muted);}
.ubtn{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.ubtn:hover{background:var(--bg3);color:var(--white);}

/* ── CHAT ── */
.chat{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);}

/* tabs */
.ch-tabs{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--b2);padding:8px 14px 0;gap:4px;overflow-x:auto;flex-shrink:0;}
.ch-tabs::-webkit-scrollbar{height:0;}
.ch-tab{display:flex;align-items:center;gap:6px;padding:7px 14px 9px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;transition:all .15s;flex-shrink:0;background:none;border-top:none;border-inline:none;}
.ch-tab:hover{color:var(--white);background:rgba(255,255,255,.03);}
.ch-tab.act{color:var(--white);border-bottom-color:var(--teal);background:rgba(62,207,198,.06);}
.ch-tab.act svg{color:var(--teal);}
.tab-acts{margin-right:auto;display:flex;gap:2px;}
.tbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;transition:all .15s;}
.tbtn:hover{background:var(--bg3);color:var(--white);}

/* messages */
.msgs{flex:1;overflow-y:auto;padding:14px;}
.msgs-inner{display:flex;flex-direction:column;}
.date-sep{display:flex;align-items:center;gap:10px;margin:6px 0 10px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--b2);}
.date-sep span{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;}
.bgroup{margin-bottom:6px;}
.brow{display:flex;align-items:flex-end;gap:8px;}
.brow.mine{flex-direction:row-reverse;}
.bav{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;cursor:pointer;overflow:hidden;}
.bav img{width:100%;height:100%;object-fit:cover;}
.bav.hide{visibility:hidden;}
.bcontent{display:flex;flex-direction:column;gap:2px;max-width:66%;}
.bmeta{display:flex;align-items:center;gap:5px;padding:0 4px;margin-bottom:2px;flex-wrap:wrap;}
.brow.mine .bmeta{flex-direction:row-reverse;}
.bname{font-size:11px;font-weight:800;}
.btime{font-size:10px;color:var(--muted2);}
.bubble{padding:9px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.bubble.other{background:var(--bg3);border:1px solid var(--b2);border-radius:4px 18px 18px 18px;color:var(--white);}
.bubble.mine{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:var(--bg);font-weight:600;border-radius:18px 4px 18px 18px;box-shadow:0 3px 12px rgba(62,207,198,.2);}
.bubble.gold-b{background:linear-gradient(135deg,#a07830,var(--gold));color:var(--bg);font-weight:600;border-radius:4px 18px 18px 18px;}
.sys-msg{text-align:center;font-size:12px;color:var(--muted);padding:4px 0 8px;font-style:italic;}

/* badges */
.bdg{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:800;flex-shrink:0;}
.bdg-owner{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid rgba(200,168,75,.25);}
.bdg-admin{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.2);}
.bdg-kove{background:rgba(62,207,198,.12);color:var(--teal);border:1px solid rgba(62,207,198,.2);}

/* typing */
.typing{padding:3px 14px 6px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;min-height:24px;flex-shrink:0;}
.tdots{display:flex;gap:3px;align-items:center;}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:td 1.3s ease-in-out infinite;}
.tdots span:nth-child(2){animation-delay:.18s;}.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}

/* input */
.inp-area{padding:0 14px 12px;flex-shrink:0;}
.inp-box{background:var(--bg3);border:1px solid var(--b2);border-radius:22px;display:flex;align-items:flex-end;gap:6px;padding:5px 6px;transition:border-color .2s,box-shadow .2s;}
.inp-box:focus-within{border-color:var(--border);box-shadow:0 0 0 3px rgba(62,207,198,.05);}
.ibtn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;flex-shrink:0;transition:all .2s;}
.ibtn:hover{color:var(--teal);background:rgba(62,207,198,.08);}
.msg-inp{flex:1;background:none;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);padding:5px 4px;resize:none;min-height:32px;max-height:120px;line-height:1.5;align-self:center;}
.msg-inp::placeholder{color:var(--muted);}
.msg-inp:disabled{opacity:.4;cursor:not-allowed;}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--teal);border:none;display:flex;align-items:center;justify-content:center;color:var(--bg);flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(62,207,198,.25);}
.send-btn:hover{transform:scale(1.08);box-shadow:0 3px 16px rgba(62,207,198,.4);}
.send-btn:active{transform:scale(.94);}
.no-perm{display:flex;align-items:center;gap:8px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.15);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--dnd);margin:0 14px 8px;}

/* ── MOBILE TOP ── */
.m-top{display:none;height:50px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);align-items:center;padding:0 12px;gap:8px;}
.m-srv-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--white);background:rgba(255,255,255,.05);padding:5px 10px;border-radius:8px;border:none;}
.m-srv-btn svg{color:var(--teal);}
.m-ch{font-size:13px;color:var(--teal);font-weight:700;margin-right:auto;}
.mtbtn{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;}

/* mobile tabs */
.m-tabs{display:none;overflow-x:auto;padding:8px 12px 0;background:var(--bg2);border-bottom:1px solid var(--b2);gap:4px;flex-shrink:0;}
.m-tabs::-webkit-scrollbar{height:0;}
.m-tab{display:flex;align-items:center;gap:5px;padding:6px 12px 8px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;transition:all .15s;background:none;border-top:none;border-inline:none;}
.m-tab:hover{color:var(--white);}
.m-tab.act{color:var(--white);border-bottom-color:var(--teal);background:rgba(62,207,198,.06);}

/* bottom nav */
.b-nav{display:none;height:54px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b2);justify-content:space-around;align-items:center;}
.bnbtn{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted2);background:none;border:none;padding:0 12px;transition:color .2s;}
.bnbtn.act{color:var(--teal);}
.bnbtn svg{width:20px;height:20px;}
.bnbtn span{font-size:9px;font-weight:700;}

/* drawers */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px);}
.ov.show{opacity:1;pointer-events:all;}
.drw{position:fixed;right:0;top:0;bottom:0;z-index:90;transform:translateX(105%);transition:transform .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;}
.drw.open{transform:none;}
.drw-srv,.drw-ch{width:256px;background:var(--bg2);border-left:1px solid var(--b2);}
.drw-hd{padding:13px 16px;border-bottom:1px solid var(--b2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drw-title{font-size:14px;font-weight:900;color:var(--white);}
.drw-cls{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:none;border:none;cursor:pointer;}
.srv-list{flex:1;overflow-y:auto;padding:10px;}
.srv-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:5px;transition:background .15s;}
.srv-item:hover{background:var(--bg3);}
.srv-item.act{background:rgba(62,207,198,.07);}
.srv-ic2{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;}
.srv-n2{font-size:13px;font-weight:800;color:var(--white);}
.srv-add2{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1.5px dashed var(--muted2);margin-top:4px;transition:all .2s;}
.srv-add2:hover{border-color:var(--teal);background:rgba(62,207,198,.04);}
.srv-add-ic{width:40px;height:40px;border-radius:12px;border:1.5px dashed var(--muted2);display:flex;align-items:center;justify-content:center;color:var(--teal);}

/* loading */
.ldg{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:10px;color:var(--muted);}
.lsp{width:26px;height:26px;border:2px solid var(--b2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.msg-new{animation:msgIn .22s ease both;}

@media(max-width:860px){
  .rail,.sidebar,.ch-tabs{display:none;}
  .m-top,.m-tabs,.b-nav{display:flex;}
  .inp-area{padding:0 10px 10px;}
  .msgs{padding:10px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="sp-img" src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"
       onerror="this.style.display='none'"/>
  <div class="sp-name">KOVE</div>
  <div class="sp-dots"><span></span><span></span><span></span></div>
</div>

<!-- MOBILE TOP -->
<div class="m-top">
  <button class="m-srv-btn" onclick="openDrw('srv')">
    <svg width="12" height="12" viewBox="0 0 28 28" fill="none"><path d="M8 4L8 24M8 14L20 4M8 14L20 24" stroke="#3ecfc6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="mSrvName">السيرفر</span>
    <svg width="10" height="10" fill="none" stroke="#4a6a82" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
  <span class="m-ch" id="mChName"># القناة</span>
  <button class="mtbtn" onclick="openDrw('ch')">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
</div>
<div class="m-tabs" id="mTabs"></div>

<!-- APP -->
<div id="app">

<!-- RAIL -->
<div class="rail" id="rail">
  <a href="index.html" class="r-logo">
    <img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"
         onerror="this.style.display='none'"/>
  </a>
  <div class="r-sep"></div>
  <a href="home.html" class="r-ic teal" title="الأصدقاء">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  </a>
  <a href="dm.html" class="r-ic teal" title="الرسائل الخاصة">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </a>
  <a href="profile.html" class="r-ic" title="ملفي" style="color:var(--muted)">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
  </a>
  <div class="r-sep"></div>
  <div id="railSrvs"></div>
  <div class="r-sep"></div>
  <div class="r-add" title="إضافة سيرفر" onclick="location.href='create-server.html'">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-hdr">
    <span class="sb-hdr-n" id="sidebarTitle">...</span>
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="ch-list" id="chList"><div class="ldg"><div class="lsp"></div></div></div>
  <div class="ubar">
    <div class="uav" id="uavEl"><span id="uavL">?</span><div class="uav-dot"></div></div>
    <div style="flex:1;min-width:0;">
      <div class="u-name" id="uNameEl">...</div>
      <div class="u-tag" id="uTagEl">@...</div>
    </div>
    <a href="profile.html" class="ubtn" title="ملفي">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
    </a>
    <a href="settings.html" class="ubtn" title="الإعدادات">

</div>

<!-- EMOJI PANEL -->
<div id="emojiP" style="display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:12px;z-index:200;box-shadow:0 14px 44px rgba(0,0,0,.7);width:min(300px,92vw);">
  <input id="eSearch" style="width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:7px;padding:7px 12px;font-family:Cairo,sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:8px;" placeholder="ابحث..." oninput="filterE(this.value)"/>
  <div id="eGrid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto;"></div>
</div>

<script>
var {createClient}=window.supabase;
var sb=createClient('https://votiamtckjctbidhuxap.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q');
var KOVE_ADMIN_ID='';
var user=null,profile=null,servers=[],curSrv=null,channels=[],curCh=null,memberRole=null,rtSub=null,isOwner=false;
var COLORS=['#3ecfc6','#c8a84b','#7c6fe0','#f87171','#22c55e','#f97316','#ec4899','#06b6d4'];
var EMOJIS=['😀','😂','😍','🥰','😎','🤩','😭','😤','🤔','😴','🥺','😈','👻','🤖','💀','👋','👍','👎','🙌','👏','✌️','🤞','👌','💪','🎮','🏆','🔥','💻','📱','🎵','⚽','🎯','💡','🎁','💎','⚡','❤️','💛','💙','💜','💔','💯','✅','⭐','🌟','🎉'];

function gc(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
function gl(n){return n?n.charAt(0).toUpperCase():'?';}
function ts(t){return new Date(t).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})+' م';}
function badges(uid,role,own){
  var b='';
  if(uid===KOVE_ADMIN_ID&&KOVE_ADMIN_ID) b+='<span class="bdg bdg-kove">Kove</span>';
  if(own) b+='<span class="bdg bdg-owner">أونر</span>';
  else if(role&&role.permissions&&(role.permissions.admin||role.permissions.manage_server)) b+='<span class="bdg bdg-admin">أدمن</span>';
  return b;
}
function canSend(){
  if(isOwner) return true;
  if(!memberRole||!memberRole.permissions) return false;
  return memberRole.permissions.admin||memberRole.permissions.send_messages;
}

window.addEventListener('load',async function(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='login.html';return;}
  user=session.user;
  var {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  if(profile){
    var col=gc(profile.name||profile.username||'k');
    ['uavEl','dUav'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.background='linear-gradient(135deg,'+col+','+col+'aa)';});
    document.getElementById('uavL').textContent=gl(profile.name);
    document.getElementById('uNameEl').textContent=profile.name||'';
    document.getElementById('uTagEl').textContent='@'+(profile.username||'');
    document.getElementById('dUavL').textContent=gl(profile.name);
    document.getElementById('dUname').textContent=profile.name||'';
    document.getElementById('dUtag').textContent='@'+(profile.username||'');
  }
  await loadServers();
  setTimeout(function(){document.getElementById('splash').classList.add('hide');document.getElementById('app').classList.add('show');},2000);
});

async function loadServers(){
  var {data}=await sb.from('server_members').select('server_id,servers(id,name,icon_url,owner_id)').eq('user_id',user.id);
  servers=(data||[]).map(function(d){return d.servers;}).filter(Boolean);
  renderRail();renderDrwSrvs();
  var params=new URLSearchParams(location.search);
  var sid=params.get('server');
  var srv=sid?servers.find(function(s){return s.id===sid;}):servers[0];
  if(srv) await selSrv(srv);
  else showEmpty();
}

function renderRail(){
  var el=document.getElementById('railSrvs');el.innerHTML='';
  servers.forEach(function(s){
    var col=gc(s.name);
    var d=document.createElement('div');
    d.className='r-ic'+(curSrv&&curSrv.id===s.id?' act':'');
    d.title=s.name;d.textContent=gl(s.name);
    if(!(curSrv&&curSrv.id===s.id)){d.style.background=col+'22';d.style.color=col;}
    d.onclick=function(){selSrv(s);};
    el.appendChild(d);
  });
}

function renderDrwSrvs(){
  var el=document.getElementById('dSrvList');el.innerHTML='';
  servers.forEach(function(s){
    var col=gc(s.name);
    var d=document.createElement('div');
    d.className='srv-item'+(curSrv&&curSrv.id===s.id?' act':'');
    d.innerHTML='<div class="srv-ic2" style="background:linear-gradient(135deg,'+col+','+col+'aa)">'+gl(s.name)+'</div><div><div class="srv-n2">'+s.name+'</div></div>';
    d.onclick=function(){selSrv(s);closeDrws();};
    el.appendChild(d);
  });
  var add=document.createElement('div');add.className='srv-add2';
  add.innerHTML='<div class="srv-add-ic"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div><div><div class="srv-n2" style="color:var(--teal)">إضافة سيرفر</div></div>';
  add.onclick=function(){location.href='create-server.html';};
  el.appendChild(add);
}

async function selSrv(s){
  curSrv=s;isOwner=s.owner_id===user.id;
  document.getElementById('sidebarTitle').textContent=s.name;
  document.getElementById('mSrvName').textContent=s.name;
  document.getElementById('dChTitle').textContent=s.name;
  renderRail();renderDrwSrvs();
  var {data:rm}=await sb.from('server_members').select('roles(name,color,permissions,position)').eq('server_id',s.id).eq('user_id',user.id).single();
  memberRole=rm&&rm.roles?rm.roles:{name:'عضو',color:'#4a6a82',permissions:{send_messages:true,view_channels:true},position:0};
  await loadChs();
}

async function loadChs(){
  document.getElementById('chList').innerHTML='<div class="ldg"><div class="lsp"></div></div>';
  var {data}=await sb.from('channels').select('*').eq('server_id',curSrv.id).order('position');
  channels=data||[];
  renderChs();
  if(channels.length>0) await selCh(channels[0]);
}

function renderChs(){
  var list=document.getElementById('chList');
  var dList=document.getElementById('dChList');
  var tabs=document.getElementById('chTabs');
  var mTabs=document.getElementById('mTabs');
  list.innerHTML='';dList.innerHTML='';tabs.innerHTML='';mTabs.innerHTML='';
  var txt=channels.filter(function(c){return c.type==='text'||!c.type;});
  if(txt.length){
    [list,dList].forEach(function(p){var c=document.createElement('div');c.className='ch-cat';c.textContent='قنوات نصية';p.appendChild(c);});
  }
  txt.forEach(function(ch){
    [false,true].forEach(function(isDrw){
      var r=document.createElement('div');
      r.className='ch-row'+(curCh&&curCh.id===ch.id?' act':'');
      r.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
      r.onclick=function(){selCh(ch);if(isDrw)closeDrws();};
      (isDrw?dList:list).appendChild(r);
    });
    var t=document.createElement('button');
    t.className='ch-tab'+(curCh&&curCh.id===ch.id?' act':'');
    t.innerHTML='<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
    t.onclick=function(){selCh(ch);};tabs.appendChild(t);
    var mt=document.createElement('button');
    mt.className='m-tab'+(curCh&&curCh.id===ch.id?' act':'');
    mt.innerHTML='<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'+ch.name;
    mt.onclick=function(){selCh(ch);};mTabs.appendChild(mt);
  });
  var acts=document.createElement('div');acts.className='tab-acts';
  acts.innerHTML='<button class="tbtn"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>';
  tabs.appendChild(acts);
}

async function selCh(ch){
  curCh=ch;
  document.getElementById('msgInp').placeholder='اكتب رسالة في #'+ch.name;
  document.getElementById('mChName').textContent='# '+ch.name;
  renderChs();
  var ex=document.querySelector('.no-perm');if(ex)ex.remove();
  if(!canSend()){
    document.getElementById('msgInp').disabled=true;
    var d=document.createElement('div');d.className='no-perm';
    d.innerHTML='<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> مش عندك صلاحية الكتابة هنا';
    document.getElementById('msgInp').closest('.inp-area').before(d);
  } else {document.getElementById('msgInp').disabled=false;}
  await loadMsgs();
  subMsgs();
}

async function loadMsgs(){
  document.getElementById('msgsEl').innerHTML='<div class="ldg"><div class="lsp"></div><span>جاري التحميل...</span></div>';
  var {data}=await sb.from('messages').select('*,profiles(id,name,username,avatar_url)').eq('channel_id',curCh.id).order('created_at',{ascending:true}).limit(60);
  renderMsgs(data||[]);
}

function renderMsgs(msgs){
  var el=document.getElementById('msgsEl');el.innerHTML='';
  var inner=document.createElement('div');inner.className='msgs-inner';inner.id='msgsInner';
  if(!msgs.length){inner.innerHTML='<div class="sys-msg">لا توجد رسائل — ابدأ المحادثة 👋</div>';el.appendChild(inner);return;}
  var sep=document.createElement('div');sep.className='date-sep';sep.innerHTML='<span>اليوم</span>';inner.appendChild(sep);
  var lastUid=null;
  msgs.forEach(function(m,i){inner.appendChild(mkBubble(m,lastUid===m.user_id&&i>0));lastUid=m.user_id;});
  el.appendChild(inner);el.scrollTop=el.scrollHeight;
}

function mkBubble(m,cont){
  var isMe=m.user_id===user.id;
  var p=m.profiles||{};var name=p.name||p.username||'مجهول';var col=gc(name);
  var own=curSrv&&m.user_id===curSrv.owner_id;
  var grp=document.createElement('div');grp.className='bgroup';if(!cont)grp.style.marginTop='6px';
  var row=document.createElement('div');row.className='brow'+(isMe?' mine':'');
  var av=document.createElement('div');av.className='bav'+(cont?' hide':'');av.style.background='linear-gradient(135deg,'+col+','+col+'99)';
  if(p.avatar_url){av.innerHTML='<img src="'+p.avatar_url+'" onerror="this.parentElement.textContent=\''+gl(name)+'\'"/>';}else{av.textContent=gl(name);}
  var bc=document.createElement('div');bc.className='bcontent';
  if(!cont){var meta=document.createElement('div');meta.className='bmeta';meta.innerHTML='<span class="bname" style="color:'+col+'">'+name+'</span>'+badges(m.user_id,memberRole,own)+'<span class="btime">'+ts(m.created_at)+'</span>';bc.appendChild(meta);}
  var bub=document.createElement('div');
  bub.className='bubble '+(isMe?'mine':'other');
  bub.textContent=m.content;
  bc.appendChild(bub);
  if(isMe){row.appendChild(bc);row.appendChild(av);}else{row.appendChild(av);row.appendChild(bc);}
  grp.appendChild(row);return grp;
}

function addMsg(m){
  var inner=document.getElementById('msgsInner');
  if(!inner){loadMsgs();return;}
  var empty=inner.querySelector('.sys-msg');if(empty)empty.remove();
  var el=mkBubble(m,false);el.classList.add('msg-new');el.style.marginTop='6px';
  inner.appendChild(el);document.getElementById('msgsEl').scrollTop=99999;
}

function subMsgs(){
  if(rtSub){sb.removeChannel(rtSub);rtSub=null;}
  if(!curCh) return;
  rtSub=sb.channel('msgs-'+curCh.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'channel_id=eq.'+curCh.id},
      async function(payload){
        var m=payload.new;
        if(m.user_id!==user.id){var {data:pr}=await sb.from('profiles').select('name,username,avatar_url').eq('id',m.user_id).single();m.profiles=pr;}
        else{m.profiles=profile;}
        addMsg(m);
      }).subscribe();
}

async function sendMsg(){
  if(!canSend()||!curCh) return;
  var inp=document.getElementById('msgInp');var txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  await sb.from('messages').insert({channel_id:curCh.id,server_id:curSrv.id,user_id:user.id,content:txt,type:'text'});
}

function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function aResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// emoji
var eAll=EMOJIS;
function buildE(list){
  document.getElementById('eGrid').innerHTML=list.map(function(e){return '<button onclick="insE(\''+e+'\')" style="aspect-ratio:1;border-radius:6px;border:none;background:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;" onmouseover="this.style.background=\'var(--bg4)\'" onmouseout="this.style.background=\'none\'">'+e+'</button>';}).join('');
}
function filterE(q){buildE(q?eAll.filter(function(e){return e.includes(q);}):eAll);}
function insE(e){document.getElementById('msgInp').value+=e;document.getElementById('msgInp').focus();closeEmoji();}
function togEmoji(){var p=document.getElementById('emojiP');if(p.style.display==='none'||!p.style.display){buildE(eAll);p.style.display='block';document.getElementById('eSearch').value='';}else{closeEmoji();}}
function closeEmoji(){document.getElementById('emojiP').style.display='none';}

function showEmpty(){
  document.getElementById('msgsEl').innerHTML='<div class="ldg"><span>مفيش سيرفرات بعد</span><button onclick="location.href=\'create-server.html\'" style="padding:10px 24px;border-radius:10px;background:var(--teal);color:var(--bg);border:none;font-size:14px;font-weight:800;cursor:pointer;">إنشاء سيرفر</button></div>';
}

function openDrw(w){document.getElementById('ov').classList.add('show');document.getElementById(w==='srv'?'dSrv':'dCh').classList.add('open');}
function closeDrws(){document.getElementById('ov').classList.remove('show');['dSrv','dCh'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('open');});}
function setBn(b){document.querySelectorAll('.bnbtn').forEach(function(x){x.classList.remove('act');});b.classList.add('act');}

document.addEventListener('click',function(e){
  var ep=document.getElementById('emojiP');
  if(ep.style.display==='block'&&!ep.contains(e.target)&&!e.target.closest('.ibtn')) closeEmoji();
});
</script>
</body>
</html>
