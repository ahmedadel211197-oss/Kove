<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove — البروفايل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#040b14;--bg2:#071320;--bg3:#0a1a2e;--bg4:#0d2038;
  --teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;
  --white:#e8f4f8;--muted:#4a6a82;--muted2:#2a4558;
  --border:rgba(62,207,198,.1);--b2:rgba(255,255,255,.05);
  --online:#22c55e;--dnd:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);overflow:hidden;}
body{color:var(--white);font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s,visibility .6s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(62,207,198,.5));animation:spP 2s ease-in-out infinite;}
.sp-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-dots{display:flex;gap:5px;}
.sp-dots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:spD 1.2s ease-in-out infinite;}
.sp-dots span:nth-child(2){animation-delay:.2s;}.sp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes spP{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
@keyframes spD{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* APP */
#app{display:flex;flex-direction:column;flex:1;overflow:hidden;opacity:0;transition:opacity .5s;height:100vh;}
#app.show{opacity:1;}

/* TOP NAV */
.top-nav{height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 18px;gap:12px;}
.nav-logo{display:flex;align-items:center;gap:8px;}
.nav-logo img{width:26px;height:26px;object-fit:contain;}
.nav-logo-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2px;background:linear-gradient(120deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sep{width:1px;height:20px;background:var(--b2);flex-shrink:0;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);transition:color .2s;}
.back-btn:hover{color:var(--white);}
.nav-title{font-size:14px;font-weight:800;color:var(--white);}
.nav-acts{margin-right:auto;display:flex;gap:6px;}
.nav-act-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;border:none;transition:all .2s;cursor:pointer;}
.btn-settings{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--b2);}
.btn-settings:hover{background:var(--bg3);color:var(--white);}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:32px 16px 48px;display:flex;justify-content:center;}
.profile-wrap{width:100%;max-width:680px;display:flex;flex-direction:column;gap:16px;}

/* PROFILE CARD */
.profile-card{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;overflow:hidden;}
.profile-banner{height:120px;background:linear-gradient(135deg,var(--teal-d),var(--bg3));position:relative;}
.profile-banner-inner{width:100%;height:100%;object-fit:cover;}
.profile-av-wrap{position:absolute;bottom:-40px;right:24px;}
.profile-av{width:80px;height:80px;border-radius:50%;border:4px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--bg);overflow:hidden;cursor:pointer;transition:opacity .2s;}
.profile-av:hover{opacity:.85;}
.profile-av img{width:100%;height:100%;object-fit:cover;}
.profile-info{padding:50px 24px 24px;}
.profile-name{font-size:22px;font-weight:900;color:var(--white);margin-bottom:3px;}
.profile-username{font-size:14px;color:var(--muted);margin-bottom:12px;}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:800;}
.bdg-kove{background:rgba(62,207,198,.12);color:var(--teal);border:1px solid rgba(62,207,198,.2);}
.bdg-owner{background:rgba(200,168,75,.15);color:var(--gold);border:1px solid rgba(200,168,75,.25);}
.profile-bio{font-size:14px;color:#8aa5bc;line-height:1.7;}
.profile-joined{font-size:12px;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:5px;}

/* EDIT FORM */
.edit-card{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:24px;}
.edit-title{font-size:15px;font-weight:800;margin-bottom:18px;color:var(--white);display:flex;align-items:center;gap:8px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field textarea:focus{border-color:var(--border);box-shadow:0 0 0 3px rgba(62,207,198,.05);}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field textarea{resize:none;height:80px;line-height:1.6;}
.field-hint{font-size:11px;color:var(--muted2);margin-top:4px;}

/* AVATAR UPLOAD */
.av-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.av-preview{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--bg);overflow:hidden;flex-shrink:0;}
.av-preview img{width:100%;height:100%;object-fit:cover;}
.av-actions{display:flex;flex-direction:column;gap:8px;}
.av-url-inp{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--white);outline:none;width:260px;transition:border-color .2s;}
.av-url-inp:focus{border-color:var(--border);}
.av-url-inp::placeholder{color:var(--muted);}
.av-hint{font-size:11px;color:var(--muted2);}

/* SAVE BTN */
.save-row{display:flex;gap:10px;margin-top:6px;}
.btn-save{padding:10px 24px;border-radius:8px;background:var(--teal);color:var(--bg);border:none;font-size:14px;font-weight:800;transition:opacity .2s,transform .15s;}
.btn-save:hover{opacity:.85;transform:translateY(-1px);}
.btn-save:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-cancel{padding:10px 18px;border-radius:8px;background:transparent;color:var(--muted);border:1px solid var(--b2);font-size:14px;font-weight:700;transition:all .2s;}
.btn-cancel:hover{border-color:var(--muted);color:var(--white);}

/* ALERT */
.alert{padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.alert.show{display:block;}
.alert.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--online);}
.alert.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--dnd);}

/* STATS */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:120px;background:var(--bg2);border:1px solid var(--b2);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;color:var(--teal);}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px;}

/* SPIN */
.spin{width:14px;height:14px;border:2px solid rgba(4,11,20,.3);border-top-color:var(--bg);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* BOTTOM NAV */
.b-nav{display:none;height:54px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--b2);justify-content:space-around;align-items:center;}
.bnbtn{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted2);background:none;border:none;padding:0 12px;transition:color .2s;}
.bnbtn.act{color:var(--teal);}
.bnbtn svg{width:20px;height:20px;}
.bnbtn span{font-size:9px;font-weight:700;}

@media(max-width:860px){
  .b-nav{display:flex;}
  .top-nav{display:none;}
}
@media(max-width:500px){
  .profile-banner{height:90px;}
  .profile-av{width:64px;height:64px;font-size:22px;}
  .profile-av-wrap{bottom:-32px;right:16px;}
  .profile-info{padding:42px 16px 20px;}
}
</style>
</head>

<script>
var {createClient}=window.supabase;
var sb=createClient('https://votiamtckjctbidhuxap.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q');
var KOVE_ADMIN_ID='';
var user=null,profile=null;
var COLORS=['#3ecfc6','#c8a84b','#7c6fe0','#f87171','#22c55e','#f97316','#ec4899','#06b6d4'];
function gc(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
function gl(n){return n?n.charAt(0).toUpperCase():'?';}

window.addEventListener('load',async function(){
  var {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='login.html';return;}
  user=session.user;
  var {data:p}=await sb.from('profiles').select('*').eq('id',user.id).single();
  profile=p;
  renderProfile();
  loadStats();
  setTimeout(function(){document.getElementById('splash').classList.add('hide');document.getElementById('app').classList.add('show');},1500);
});

function renderProfile(){
  if(!profile) return;
  var col=gc(profile.name||profile.username||'k');

  // banner color
  document.getElementById('profileBanner').style.background='linear-gradient(135deg,'+col+'44,var(--bg3))';

  // avatar
  var av=document.getElementById('profileAv');
  av.style.background='linear-gradient(135deg,'+col+','+col+'aa)';
  if(profile.avatar_url){
    av.innerHTML='<img src="'+profile.avatar_url+'" onerror="this.parentElement.innerHTML=\'<span>'+gl(profile.name)+'</span>\'"/>';
  } else {
    document.getElementById('profileAvLetter').textContent=gl(profile.name);
  }

  // info
  document.getElementById('profileName').textContent=profile.name||'';
  document.getElementById('profileUsername').textContent='@'+(profile.username||'');
  document.getElementById('profileBio').textContent=profile.bio||'لا توجد نبذة بعد.';
  document.getElementById('profileJoined').textContent='انضم في '+new Date(user.created_at).toLocaleDateString('ar-EG',{year:'numeric',month:'long'});

  // badges
  var badges='';
  if(user.id===KOVE_ADMIN_ID&&KOVE_ADMIN_ID) badges+='<span class="bdg bdg-kove">Kove Admin</span>';
  document.getElementById('profileBadges').innerHTML=badges;

  // edit form
  document.getElementById('editName').value=profile.name||'';
  document.getElementById('editUsername').value=profile.username||'';
  document.getElementById('editBio').value=profile.bio||'';
  document.getElementById('editAv').value=profile.avatar_url||'';

  // preview
  var prev=document.getElementById('avPreview');
  prev.style.background='linear-gradient(135deg,'+col+','+col+'aa)';
  if(profile.avatar_url){prev.innerHTML='<img src="'+profile.avatar_url+'" onerror="this.parentElement.innerHTML=\'<span id=avPreviewLetter>'+gl(profile.name)+'</span>\'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>';}
  else{document.getElementById('avPreviewLetter').textContent=gl(profile.name);}
}

async function loadStats(){
  var {count:srvs}=await sb.from('server_members').select('*',{count:'exact',head:true}).eq('user_id',user.id);
  var {count:friends}=await sb.from('friendships').select('*',{count:'exact',head:true}).or('user_id.eq.'+user.id+',friend_id.eq.'+user.id).eq('status','accepted');
  var {count:msgs}=await sb.from('messages').select('*',{count:'exact',head:true}).eq('user_id',user.id);
  document.getElementById('statSrvs').textContent=srvs||0;
  document.getElementById('statFriends').textContent=friends||0;
  document.getElementById('statMsgs').textContent=msgs||0;
}

function previewAv(url){
  var prev=document.getElementById('avPreview');
  var col=gc(profile&&(profile.name||profile.username)||'k');
  prev.style.background='linear-gradient(135deg,'+col+','+col+'aa)';
  if(url&&url.startsWith('http')){
    prev.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML=\'<span>'+gl(profile&&profile.name)+'</span>\'"/>';
  } else {
    prev.innerHTML='<span id="avPreviewLetter">'+gl(profile&&profile.name)+'</span>';
  }
}

function showAlert(msg,type){var el=document.getElementById('alert');el.textContent=msg;el.className='alert show '+type;}

async function saveProfile(){
  var btn=document.getElementById('saveBtn');
  var name=document.getElementById('editName').value.trim();
  var username=document.getElementById('editUsername').value.trim().toLowerCase();
  var bio=document.getElementById('editBio').value.trim();
  var avatarUrl=document.getElementById('editAv').value.trim();

  if(!name){showAlert('أدخل الاسم','err');return;}
  if(!username){showAlert('أدخل اسم المستخدم','err');return;}
  if(!/^[a-z0-9_]+$/.test(username)){showAlert('اسم المستخدم: حروف إنجليزية وأرقام وـ فقط','err');return;}

  btn.disabled=true;btn.innerHTML='<span class="spin"></span>جاري الحفظ...';

  // check username unique
  if(username!==profile.username){
    var {data:ex}=await sb.from('profiles').select('id').eq('username',username).neq('id',user.id).single();
    if(ex){btn.disabled=false;btn.textContent='حفظ التغييرات';showAlert('اسم المستخدم ده مأخوذ','err');return;}
  }

  var upd={name,username,bio,avatar_url:avatarUrl||null};
  var {error}=await sb.from('profiles').update(upd).eq('id',user.id);
  if(error){btn.disabled=false;btn.textContent='حفظ التغييرات';showAlert('حصل خطأ: '+error.message,'err');return;}
  profile=Object.assign(profile,upd);
  renderProfile();
  btn.disabled=false;btn.textContent='حفظ التغييرات';
  showAlert('تم الحفظ بنجاح ✅','ok');
}

function cancelEdit(){
  document.getElementById('editName').value=profile.name||'';
  document.getElementById('editUsername').value=profile.username||'';
  document.getElementById('editBio').value=profile.bio||'';
  document.getElementById('editAv').value=profile.avatar_url||'';
  previewAv(profile.avatar_url||'');
  document.getElementById('alert').className='alert';
}
</script>
</body>
</html>
