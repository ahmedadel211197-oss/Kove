<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kove — إنشاء سيرفر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --bg:#040b14;--bg2:#071320;--bg3:#0a1a2e;--bg4:#0d2038;
  --teal:#3ecfc6;--teal-d:#2a9d94;--gold:#c8a84b;
  --white:#e8f4f8;--muted:#4a6a82;--muted2:#2a4558;
  --border:rgba(62,207,198,.1);--b2:rgba(255,255,255,.05);
  --online:#22c55e;--dnd:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);}
body{color:var(--white);font-family:'Cairo',sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
button{font-family:'Cairo',sans-serif;cursor:pointer;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s,visibility .6s;}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.sp-img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 24px rgba(62,207,198,.5));animation:spP 2s ease-in-out infinite;}
.sp-name{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sp-dots{display:flex;gap:5px;}
.sp-dots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:spD 1.2s ease-in-out infinite;}
.sp-dots span:nth-child(2){animation-delay:.2s;}.sp-dots span:nth-child(3){animation-delay:.4s;}
@keyframes spP{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
@keyframes spD{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* APP */
#app{display:flex;flex-direction:column;flex:1;opacity:0;transition:opacity .5s;overflow:hidden;height:100vh;}
#app.show{opacity:1;}

/* TOP NAV */
.top-nav{height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--b2);display:flex;align-items:center;padding:0 18px;gap:12px;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo img{width:28px;height:28px;object-fit:contain;}
.nav-logo-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;letter-spacing:2px;background:linear-gradient(120deg,var(--teal),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sep{width:1px;height:22px;background:var(--b2);}
.nav-label{font-size:13px;font-weight:700;color:var(--muted);}
.nav-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);text-decoration:none;margin-right:auto;transition:color .2s;}
.nav-back:hover{color:var(--white);}

/* PAGE */
.page{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px 48px;}
.card{width:100%;max-width:460px;background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.card-title{font-size:20px;font-weight:900;text-align:center;margin-bottom:6px;color:var(--white);}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px;line-height:1.7;}

/* ICON PREVIEW */
.icon-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:22px;}
.icon-preview{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;cursor:pointer;transition:transform .2s;user-select:none;overflow:hidden;position:relative;}
.icon-preview:hover{transform:scale(1.05);}
.icon-preview img{width:100%;height:100%;object-fit:cover;}
.icon-lbl{font-size:11px;color:var(--muted);}

/* FORM */
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
.field input,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--white);outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field textarea:focus{border-color:var(--border);box-shadow:0 0 0 3px rgba(62,207,198,.06);}
.field input::placeholder,.field textarea::placeholder{color:var(--muted);}
.field textarea{resize:none;height:68px;line-height:1.6;}
.char-count{font-size:10px;color:var(--muted2);text-align:left;margin-top:4px;}

/* COLOR PICKER */
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.c-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent;flex-shrink:0;}
.c-dot:hover{transform:scale(1.15);}
.c-dot.sel{border-color:white;box-shadow:0 0 0 2px var(--teal);}

/* ACTIONS */
.actions{display:flex;gap:10px;margin-top:20px;}
.btn-main{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:800;background:var(--teal);color:var(--bg);transition:opacity .2s,transform .15s;}
.btn-main:hover{opacity:.87;transform:translateY(-1px);}
.btn-main:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-ghost{padding:12px 18px;border-radius:8px;font-size:14px;font-weight:700;background:transparent;color:var(--white);border:1px solid var(--b2);transition:all .2s;}
.btn-ghost:hover{border-color:var(--muted);background:rgba(255,255,255,.03);}

/* ALERT */
.alert{padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.alert.show{display:block;}
.alert.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--online);}
.alert.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--dnd);}

/* SPINNER */
.spin{width:14px;height:14px;border:2px solid rgba(4,11,20,.3);border-top-color:var(--bg);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px;}
@keyframes sp{to{transform:rotate(360deg);}}

@media(max-width:500px){.card{padding:22px 16px;}.actions{flex-direction:column;}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="sp-img" src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"
       onerror="this.style.display='none'"/>
  <div class="sp-name">KOVE</div>
  <div class="sp-dots"><span></span><span></span><span></span></div>
</div>

<!-- APP -->
<div id="app">

  <!-- NAV -->
  <div class="top-nav">
    <a href="app.html" class="nav-logo">
      <img src="img/file_000000008270720a8e1e80fd9d619876-removebg-preview (1).png" alt="Kove"
           onerror="this.style.display='none'"/>
      <span class="nav-logo-name">KOVE</span>
    </a>
    <div class="nav-sep"></div>
    <span class="nav-label">إنشاء سيرفر جديد</span>
    <a href="app.html" class="nav-back">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      رجوع
    </a>
  </div>

  <!-- PAGE -->
  <div class="page">
    <div class="card">
      <h1 class="card-title">ابني مجتمعك</h1>
      <p class="card-sub">السيرفر هو مكان انت وأصحابك تتكلموا فيه — ابدأ باسم وأيقونة.</p>

      <div class="alert" id="alert"></div>

      <!-- icon preview -->
      <div class="icon-wrap">
        <div class="icon-preview" id="iconPreview">
          <span id="iconLetter">؟</span>
        </div>
        <span class="icon-lbl">أيقونة السيرفر</span>
      </div>

      <!-- icon url -->
      <div class="field">
        <label>رابط صورة الأيقونة (اختياري)</label>
        <input type="url" id="iconUrl" placeholder="https://example.com/image.png" oninput="onIconUrl(this.value)"/>
      </div>

      <!-- name -->
      <div class="field">
        <label>اسم السيرفر *</label>
        <input type="text" id="srvName" placeholder="سيرفر الجيمرز" maxlength="50"
               oninput="onNameChange(this.value)"/>
        <div class="char-count" id="nameChar">0 / 50</div>
      </div>

      <!-- color -->
      <div class="field">
        <label>لون السيرفر</label>
        <div class="color-row" id="colorRow"></div>
      </div>

      <!-- description -->
      <div class="field">
        <label>وصف (اختياري)</label>
        <textarea id="srvDesc" placeholder="سيرفر مخصص للجيمرز المصريين..." maxlength="200"
                  oninput="document.getElementById('descChar').textContent=this.value.length+' / 200'"></textarea>
        <div class="char-count" id="descChar">0 / 200</div>
      </div>

      <div class="actions">
        <button class="btn-ghost" onclick="history.back()">إلغاء</button>
        <button class="btn-main" id="createBtn" onclick="doCreate()">إنشاء السيرفر</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
var { createClient } = window.supabase;
var sb = createClient(
  'https://votiamtckjctbidhuxap.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvdGlhbXRja2pjdGJpZGh1eGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU3NDcsImV4cCI6MjA4OTUxMTc0N30.iOcJ51FsEj2qsv8G2UqBshFe5NGw9x1OUw57z9vvu0Q'
);

var COLORS = ['#3ecfc6','#c8a84b','#7c6fe0','#f87171','#22c55e','#f97316','#ec4899','#06b6d4','#8b5cf6','#0ea5e9'];
var selColor = COLORS[0];

// build color picker
var cr = document.getElementById('colorRow');
COLORS.forEach(function(c, i) {
  var d = document.createElement('div');
  d.className = 'c-dot' + (i === 0 ? ' sel' : '');
  d.style.background = c;
  d.onclick = function() {
    document.querySelectorAll('.c-dot').forEach(function(x){x.classList.remove('sel');});
    d.classList.add('sel');
    selColor = c;
    refreshPreview();
  };
  cr.appendChild(d);
});

function refreshPreview() {
  var name = document.getElementById('srvName').value;
  var url = document.getElementById('iconUrl').value.trim();
  var prev = document.getElementById('iconPreview');
  if(url && url.startsWith('http')) {
    prev.innerHTML = '<img src="'+url+'" onerror="this.style.display=\'none\'"/>';
  } else {
    prev.innerHTML = '<span id="iconLetter">'+(name ? name.charAt(0).toUpperCase() : '؟')+'</span>';
    prev.style.background = 'linear-gradient(135deg,'+selColor+','+selColor+'aa)';
  }
}

function onNameChange(val) {
  document.getElementById('nameChar').textContent = val.length + ' / 50';
  refreshPreview();
}

function onIconUrl(val) {
  refreshPreview();
}

function showAlert(msg, type) {
  var el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert show ' + type;
}

function setLoading(on) {
  var btn = document.getElementById('createBtn');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spin"></span>جاري الإنشاء...' : 'إنشاء السيرفر';
}

async function doCreate() {
  var { data: { session } } = await sb.auth.getSession();
  if(!session) { window.location.href = 'login.html'; return; }

  var name = document.getElementById('srvName').value.trim();
  var iconUrl = document.getElementById('iconUrl').value.trim();

  if(!name) { showAlert('أدخل اسم السيرفر', 'err'); return; }
  if(name.length < 2) { showAlert('الاسم لازم يكون حرفين على الأقل', 'err'); return; }

  setLoading(true);
  var { data: srvId, error } = await sb.rpc('create_server', { p_name: name, p_user_id: session.user.id });
  if(error) { setLoading(false); showAlert('حصل خطأ: ' + error.message, 'err'); return; }
  if(iconUrl) await sb.from('servers').update({ icon_url: iconUrl }).eq('id', srvId);

  showAlert('تم إنشاء السيرفر! 🎉', 'ok');
  setTimeout(function() { window.location.href = 'app.html?server=' + srvId; }, 1000);
}

// init
window.addEventListener('load', async function() {
  var { data: { session } } = await sb.auth.getSession();
  if(!session) { window.location.href = 'login.html'; return; }
  refreshPreview();
  setTimeout(function() {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
  }, 1500);
});

document.getElementById('srvName').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') doCreate();
});
</script>
</body>
</html>
